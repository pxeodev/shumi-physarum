<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUMI — ASCII Mascot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        pre {
            font-family: 'Geist Mono', 'Courier New', monospace;
            font-size: 4.5px;
            line-height: 5.5px;
            letter-spacing: 0.3px;
            user-select: none;
            animation: breathe 5s ease-in-out infinite;
        }
        s { text-decoration: none; }
        @keyframes breathe {
            0%, 100% { filter: brightness(1.0); }
            50% { filter: brightness(1.35); }
        }
    </style>
</head>
<body>
<pre id="m">
Loading...
</pre>
<script>
// Runtime pixel-sampling ASCII mascot generator
// Reads shumi.webp, samples pixels, generates colored <s> grid
const COLS = 180;
const CHARS = "$#@%&*+=!?/|(){}[]<>:;,.~^-_abcdefghijklmnopqrstuvwxyz0123456789";
const THRESHOLD = 10;

const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const aspect = img.height / img.width;
    const rows = Math.round(COLS * aspect * 0.5);
    canvas.width = COLS;
    canvas.height = rows;
    ctx.drawImage(img, 0, 0, COLS, rows);
    const data = ctx.getImageData(0, 0, COLS, rows).data;

    let html = '';
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < COLS; x++) {
            const i = (y * COLS + x) * 4;
            let r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;

            if (lum < THRESHOLD || a < 30) {
                html += ' ';
                continue;
            }

            // Boost dim colors so they read on dark bg and at thumbnail size
            let boost = 1.3;
            if (lum < 100) {
                boost = Math.min(120 / lum, 3.0);
            }
            const fr = Math.min(255, Math.round(r * boost));
            const fg = Math.min(255, Math.round(g * boost));
            const fb = Math.min(255, Math.round(b * boost));

            const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
            html += `<s style="color:rgb(${fr},${fg},${fb})">${ch}</s>`;
        }
        html += '\n';
    }

    document.getElementById('m').innerHTML = html;

    // Character cycling
    const spans = document.querySelectorAll('#m s');
    const arr = Array.from(spans);
    setInterval(() => {
        const n = Math.floor(arr.length * 0.08);
        for (let i = 0; i < n; i++) {
            arr[Math.floor(Math.random() * arr.length)].textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
        }
    }, 900);
};
img.src = 'shumi.webp';
</script>
</body>
</html>
