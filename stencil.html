<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shumi</title>
    <meta property="og:title" content="shumi">
    <meta property="og:description" content="physarum simulation. each seed is different.">
    <meta property="og:image" content="https://haddencarpenter.github.io/shumi-physarum/og-thumbnail.png">
    <meta property="og:url" content="https://haddencarpenter.github.io/shumi-physarum/stencil.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="shumi">
    <meta name="twitter:description" content="physarum simulation. each seed is different.">
    <meta name="twitter:image" content="https://haddencarpenter.github.io/shumi-physarum/og-thumbnail.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0D0D0D; overflow: hidden; font-family: 'Courier New', monospace; }
        /* Background physarum — fills entire viewport */
        #bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
        /* Mascot layer — centered, chromatic orbit */
        #mascot-layer {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2;
            animation: chromatic-orbit 6s linear infinite, breathe 5s ease-in-out infinite;
        }
        @keyframes breathe {
            0%   { transform: translate(-50%, -50%) scale(1.0); }
            50%  { transform: translate(-50%, -50%) scale(1.018); }
            100% { transform: translate(-50%, -50%) scale(1.0); }
        }
        @keyframes chromatic-orbit {
            0%   { filter: drop-shadow(8px 0 2px rgba(255,60,40,0.25)) drop-shadow(-8px 0 2px rgba(40,220,255,0.25)); }
            25%  { filter: drop-shadow(0 8px 2px rgba(255,60,40,0.25)) drop-shadow(0 -8px 2px rgba(40,220,255,0.25)); }
            50%  { filter: drop-shadow(-8px 0 2px rgba(255,60,40,0.25)) drop-shadow(8px 0 2px rgba(40,220,255,0.25)); }
            75%  { filter: drop-shadow(0 -8px 2px rgba(255,60,40,0.25)) drop-shadow(0 8px 2px rgba(40,220,255,0.25)); }
            100% { filter: drop-shadow(8px 0 2px rgba(255,60,40,0.25)) drop-shadow(-8px 0 2px rgba(40,220,255,0.25)); }
        }

        /* Subtle chromatic on background too — slower, dimmer */
        #bg {
            animation: bg-chromatic 14s linear infinite;
        }
        @keyframes bg-chromatic {
            0%   { filter: drop-shadow(3px 0 1px rgba(255,60,40,0.08)) drop-shadow(-3px 0 1px rgba(40,220,255,0.08)); }
            50%  { filter: drop-shadow(-3px 0 1px rgba(255,60,40,0.08)) drop-shadow(3px 0 1px rgba(40,220,255,0.08)); }
            100% { filter: drop-shadow(3px 0 1px rgba(255,60,40,0.08)) drop-shadow(-3px 0 1px rgba(40,220,255,0.08)); }
        }
        /* Kill expensive CSS filters on mobile — drop-shadow on canvas tanks GPU */
        @media (max-width: 768px) {
            #mascot-layer { animation: breathe 5s ease-in-out infinite !important; filter: none !important; }
            #bg { animation: none !important; filter: none !important; }
        }
        /* Hidden work canvases */
        .hidden-canvas { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; width: 0; height: 0; overflow: hidden; }
        /* Composite output for recording */
        #composite { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; opacity: 0; }
        #watermark {
            position: fixed; bottom: 58px; right: 14px; z-index: 10;
            font: 600 14px 'Courier New', monospace; color: #D4A84B; opacity: 0.7;
            pointer-events: none; text-align: right;
            text-shadow: 0 0 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);
        }
        #hint {
            position: fixed; bottom: 42px; right: 14px; z-index: 10;
            font: 11px 'Courier New', monospace; color: #aaa; opacity: 0;
            pointer-events: none; text-align: right;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            animation: hintFade 8s ease-out forwards;
        }
        @keyframes hintFade {
            0% { opacity: 0; }
            5% { opacity: 0.7; }
            50% { opacity: 0.5; }
            100% { opacity: 0; }
        }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 10;
        }
        .btn {
            padding: 10px 20px; border: 1px solid #333; background: rgba(13,13,13,0.85);
            color: #D4A84B; font-family: 'Courier New', monospace; font-size: 13px;
            cursor: pointer; border-radius: 6px; transition: all 0.2s; backdrop-filter: blur(8px);
        }
        .btn:hover { border-color: #D4A84B; background: rgba(212,168,75,0.1); }
        .btn.active { border-color: #ff4444; color: #ff4444; }
        #status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #666; font-size: 11px; opacity: 0; z-index: 10;
            transition: opacity 0.8s;
            letter-spacing: 2px;
            text-transform: lowercase;
        }
        #status.show { opacity: 0.4; }
        .mode-btn { font-size: 11px !important; padding: 6px 12px !important; text-align: left; }
        .mode-btn.active { border-color: #D4A84B !important; color: #D4A84B !important; background: rgba(212,168,75,0.15) !important; }

        /* ── Settings Panel ── */
        #settings-panel {
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px; z-index: 20;
            background: rgba(13,13,13,0.92); backdrop-filter: blur(12px);
            border-right: 1px solid #222; overflow-y: auto; overflow-x: hidden;
            transform: translateX(-100%); transition: transform 0.3s ease;
            font-family: 'Courier New', monospace; color: #999; font-size: 11px;
            scrollbar-width: thin; scrollbar-color: #333 transparent;
        }
        #settings-panel.open { transform: translateX(0); }
        #settings-panel::-webkit-scrollbar { width: 4px; }
        #settings-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .panel-inner { padding: 16px 14px 80px; }
        .panel-section { margin-bottom: 16px; }
        .panel-section h3 {
            color: #D4A84B; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            margin: 0 0 10px; padding-bottom: 4px; border-bottom: 1px solid #222;
        }
        .panel-section h4 {
            color: #777; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
            margin: 12px 0 6px;
        }
        .sg { margin-bottom: 8px; }
        .sg label { display: block; color: #888; font-size: 10px; margin-bottom: 2px; }
        .sg .sl { display: flex; align-items: center; gap: 6px; }
        .sg .sl input[type="range"] {
            flex: 1; height: 3px; background: #222; border-radius: 2px; outline: none;
            -webkit-appearance: none; cursor: pointer;
        }
        .sg .sl input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 11px; height: 11px; background: #D4A84B;
            border-radius: 50%; cursor: pointer;
        }
        .sg .sl input[type="range"]::-moz-range-thumb {
            width: 11px; height: 11px; background: #D4A84B; border-radius: 50%;
            border: none; cursor: pointer;
        }
        .sg .vd { min-width: 38px; text-align: right; color: #D4A84B; font-size: 10px; }
        #toggle-panel {
            position: fixed; top: 12px; left: 12px; z-index: 21;
            padding: 6px 10px; border: 1px solid #333; background: rgba(13,13,13,0.85);
            color: #D4A84B; font-family: 'Courier New', monospace; font-size: 11px;
            cursor: pointer; border-radius: 4px; backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        #toggle-panel:hover { border-color: #D4A84B; background: rgba(212,168,75,0.1); }
        @media (max-width: 768px) {
            #settings-panel { width: 260px; font-size: 10px; }
            .panel-inner { padding: 12px 10px 80px; }
            #mode-controls { top: auto; bottom: 60px; right: 10px; flex-direction: row; flex-wrap: wrap; gap: 4px; }
            .mode-btn { font-size: 9px !important; padding: 4px 8px !important; }
            #controls { bottom: 10px; gap: 6px; }
            .btn { font-size: 11px; padding: 8px 14px; }
        }
    </style>
</head>
<body>
    <!-- Background physarum: full viewport -->
    <canvas id="bg"></canvas>
    <!-- Mascot masked physarum: square, centered -->
    <canvas id="mascot-layer"></canvas>
    <!-- Hidden work canvases -->
    <div class="hidden-canvas">
        <canvas id="bg-sim"></canvas>
        <canvas id="mascot-sim"></canvas>
        <canvas id="mask-canvas"></canvas>
    </div>
    <!-- Composite for recording -->
    <canvas id="composite"></canvas>

    <div id="status"></div>
    <button id="toggle-panel" onclick="document.getElementById('settings-panel').classList.toggle('open')">☰ Settings</button>

    <div id="settings-panel">
        <div class="panel-inner">
            <div class="panel-section">
                <h3>Seed</h3>
                <div class="sg"><div class="sl"><input type="text" id="s-seed" style="flex:1;background:#111;border:1px solid #333;color:#D4A84B;padding:4px 8px;font-family:inherit;font-size:11px;border-radius:3px;text-align:center;" onchange="seed=parseInt(this.value)||1;restart()"><button class="btn" style="font-size:10px;padding:4px 8px;" onclick="restart()">Jump</button></div></div>
            </div>

            <div class="panel-section">
                <h3>Background Network</h3>
                <h4>Colony</h4>
                <div class="sg"><label>Agent Count</label><div class="sl"><input type="range" id="s-bg-agentCount" min="2000" max="15000" step="500" oninput="BG.agentCount=+this.value;sv(this)"><span class="vd" id="s-bg-agentCount-v"></span></div></div>
                <div class="sg"><label>Speed</label><div class="sl"><input type="range" id="s-bg-speed" min="2" max="14" step="0.2" oninput="BG.speed=+this.value;sv(this)"><span class="vd" id="s-bg-speed-v"></span></div></div>
                <div class="sg"><label>Sensor Distance</label><div class="sl"><input type="range" id="s-bg-sensorDist" min="8" max="40" step="1" oninput="BG.sensorDist=+this.value;sv(this)"><span class="vd" id="s-bg-sensorDist-v"></span></div></div>
                <div class="sg"><label>Sensor Angle</label><div class="sl"><input type="range" id="s-bg-sensorAngle" min="15" max="70" step="1" oninput="BG.sensorAngle=+this.value*Math.PI/180;sv(this)"><span class="vd" id="s-bg-sensorAngle-v"></span></div></div>
                <div class="sg"><label>Turn Speed</label><div class="sl"><input type="range" id="s-bg-turnSpeed" min="10" max="45" step="1" oninput="BG.turnSpeed=+this.value*Math.PI/180;sv(this)"><span class="vd" id="s-bg-turnSpeed-v"></span></div></div>
                <div class="sg"><label>Steps/Frame</label><div class="sl"><input type="range" id="s-bg-stepsPerFrame" min="1" max="10" step="1" oninput="BG.stepsPerFrame=+this.value;sv(this)"><span class="vd" id="s-bg-stepsPerFrame-v"></span></div></div>
                <div class="sg"><label>Spawn Rate</label><div class="sl"><input type="range" id="s-bg-spawnRate" min="20" max="300" step="10" oninput="BG.spawnRate=+this.value;sv(this)"><span class="vd" id="s-bg-spawnRate-v"></span></div></div>
                <h4>Chemistry</h4>
                <div class="sg"><label>Deposit</label><div class="sl"><input type="range" id="s-bg-deposit" min="3" max="30" step="1" oninput="BG.deposit=+this.value;sv(this)"><span class="vd" id="s-bg-deposit-v"></span></div></div>
                <div class="sg"><label>Decay</label><div class="sl"><input type="range" id="s-bg-decay" min="0.930" max="0.990" step="0.001" oninput="BG.decay=+this.value;sv(this)"><span class="vd" id="s-bg-decay-v"></span></div></div>
                <div class="sg"><label>Diffusion</label><div class="sl"><input type="range" id="s-bg-diffusion" min="0.05" max="0.55" step="0.01" oninput="BG.diffusion=+this.value;sv(this)"><span class="vd" id="s-bg-diffusion-v"></span></div></div>
                <h4>Appearance</h4>
                <div class="sg"><label>Trail Brightness</label><div class="sl"><input type="range" id="s-bg-trailBright" min="0.5" max="3.0" step="0.1" oninput="BG.trailBright=+this.value;sv(this)"><span class="vd" id="s-bg-trailBright-v"></span></div></div>
                <div class="sg"><label>Agent Glow</label><div class="sl"><input type="range" id="s-bg-agentGlow" min="0" max="1.0" step="0.02" oninput="BG.agentGlow=+this.value;sv(this)"><span class="vd" id="s-bg-agentGlow-v"></span></div></div>
                <div class="sg"><label>Food Count</label><div class="sl"><input type="range" id="s-bg-foodCount" min="0" max="25" step="1" oninput="BG.foodCount=+this.value;sv(this)"><span class="vd" id="s-bg-foodCount-v"></span></div></div>
                <div class="sg"><label>Food Strength</label><div class="sl"><input type="range" id="s-bg-foodStr" min="0" max="35" step="1" oninput="BG.foodStr=+this.value;sv(this)"><span class="vd" id="s-bg-foodStr-v"></span></div></div>
                <div class="sg"><label>Spawn Radius</label><div class="sl"><input type="range" id="s-bg-spawnR" min="5" max="40" step="1" oninput="BG.spawnR=+this.value;sv(this)"><span class="vd" id="s-bg-spawnR-v"></span></div></div>
            </div>

            <div class="panel-section">
                <h3>Mascot Physarum</h3>
                <h4>Colony</h4>
                <div class="sg"><label>Agent Count</label><div class="sl"><input type="range" id="s-ms-agentCount" min="1000" max="10000" step="500" oninput="MS.agentCount=+this.value;sv(this)"><span class="vd" id="s-ms-agentCount-v"></span></div></div>
                <div class="sg"><label>Speed</label><div class="sl"><input type="range" id="s-ms-speed" min="1" max="10" step="0.2" oninput="MS.speed=+this.value;sv(this)"><span class="vd" id="s-ms-speed-v"></span></div></div>
                <div class="sg"><label>Sensor Distance</label><div class="sl"><input type="range" id="s-ms-sensorDist" min="5" max="35" step="1" oninput="MS.sensorDist=+this.value;sv(this)"><span class="vd" id="s-ms-sensorDist-v"></span></div></div>
                <div class="sg"><label>Sensor Angle</label><div class="sl"><input type="range" id="s-ms-sensorAngle" min="15" max="65" step="1" oninput="MS.sensorAngle=+this.value*Math.PI/180;sv(this)"><span class="vd" id="s-ms-sensorAngle-v"></span></div></div>
                <div class="sg"><label>Turn Speed</label><div class="sl"><input type="range" id="s-ms-turnSpeed" min="8" max="42" step="1" oninput="MS.turnSpeed=+this.value*Math.PI/180;sv(this)"><span class="vd" id="s-ms-turnSpeed-v"></span></div></div>
                <div class="sg"><label>Steps/Frame</label><div class="sl"><input type="range" id="s-ms-stepsPerFrame" min="1" max="10" step="1" oninput="MS.stepsPerFrame=+this.value;sv(this)"><span class="vd" id="s-ms-stepsPerFrame-v"></span></div></div>
                <div class="sg"><label>Spawn Rate</label><div class="sl"><input type="range" id="s-ms-spawnRate" min="10" max="200" step="5" oninput="MS.spawnRate=+this.value;sv(this)"><span class="vd" id="s-ms-spawnRate-v"></span></div></div>
                <h4>Chemistry</h4>
                <div class="sg"><label>Deposit</label><div class="sl"><input type="range" id="s-ms-deposit" min="3" max="30" step="1" oninput="MS.deposit=+this.value;sv(this)"><span class="vd" id="s-ms-deposit-v"></span></div></div>
                <div class="sg"><label>Decay</label><div class="sl"><input type="range" id="s-ms-decay" min="0.935" max="0.990" step="0.001" oninput="MS.decay=+this.value;sv(this)"><span class="vd" id="s-ms-decay-v"></span></div></div>
                <div class="sg"><label>Diffusion</label><div class="sl"><input type="range" id="s-ms-diffusion" min="0.05" max="0.50" step="0.01" oninput="MS.diffusion=+this.value;sv(this)"><span class="vd" id="s-ms-diffusion-v"></span></div></div>
                <h4>Appearance</h4>
                <div class="sg"><label>Trail Brightness</label><div class="sl"><input type="range" id="s-ms-trailBright" min="0.8" max="4.5" step="0.1" oninput="MS.trailBright=+this.value;sv(this)"><span class="vd" id="s-ms-trailBright-v"></span></div></div>
                <div class="sg"><label>Agent Glow</label><div class="sl"><input type="range" id="s-ms-agentGlow" min="0" max="1.5" step="0.02" oninput="MS.agentGlow=+this.value;sv(this)"><span class="vd" id="s-ms-agentGlow-v"></span></div></div>
                <div class="sg"><label>Spawn Radius</label><div class="sl"><input type="range" id="s-ms-spawnR" min="3" max="30" step="1" oninput="MS.spawnR=+this.value;sv(this)"><span class="vd" id="s-ms-spawnR-v"></span></div></div>
            </div>

            <div class="panel-section">
                <h3>Stencil</h3>
                <div class="sg"><label>Master Opacity</label><div class="sl"><input type="range" id="s-stencilMaster" min="0" max="1.5" step="0.01" oninput="window._stencilMaster=+this.value;sv(this);updateShareURL()"><span class="vd" id="s-stencilMaster-v"></span></div></div>
                <div class="sg"><label>Edge Strong</label><div class="sl"><input type="range" id="s-edgeStrong" min="0.1" max="0.6" step="0.01" oninput="window._edgeStrong=+this.value;sv(this);updateShareURL()"><span class="vd" id="s-edgeStrong-v"></span></div></div>
                <div class="sg"><label>Edge Weak</label><div class="sl"><input type="range" id="s-edgeWeak" min="0.04" max="0.3" step="0.01" oninput="window._edgeWeak=+this.value;sv(this);updateShareURL()"><span class="vd" id="s-edgeWeak-v"></span></div></div>
                <div class="sg"><label>Pulse Speed</label><div class="sl"><input type="range" id="s-pulseSpeed" min="0.01" max="0.12" step="0.002" oninput="window._pulseSpeed=+this.value;sv(this)"><span class="vd" id="s-pulseSpeed-v"></span></div></div>
            </div>
        </div>
    </div>

    <div id="mode-controls" style="position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:10;">
        <button class="btn mode-btn active" data-mode="1" onclick="setMode(1)">1 Ramp</button>
        <button class="btn mode-btn" data-mode="2" onclick="setMode(2)">2 Code</button>
        <button class="btn mode-btn" data-mode="3" onclick="setMode(3)">3 Mold</button>
        <button class="btn mode-btn" data-mode="4" onclick="setMode(4)">4 Hybrid</button>
    </div>
    <div id="controls">
        <button class="btn" onclick="restart()">New Seed</button>
        <button class="btn" id="rec-btn" onclick="toggleRecord()">● Record</button>
        <button class="btn" onclick="savePNG()">Save PNG</button>
        <button class="btn" onclick="copyLink()">Share</button>
    </div>
    <div id="watermark"></div>
    <div id="hint"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════

// ── Palette families ──
// Each: { name, mascot: [dark, mid, hot], bg: [dark, mid, hot], chromatic: [warm, cool] }
// Texture profiles: define how trails behave per palette
// bg/ms overrides are applied on top of base BG/MS params
const TEXTURES = {
    // Warm, steady glow. Medium everything, the baseline.
    standard:    { bg: { speed: 7.0, sensorDist: 22, diffusion: 0.25, deposit: 12, decay: 0.960, turnSpeed: 26, trailBright: 1.3, foodCount: 12 },
                   ms: { speed: 3.2, sensorDist: 22, diffusion: 0.25, deposit: 4, decay: 0.925, turnSpeed: 22, trailBright: 0.8 } },
    // Sharp defined veins, gem-like facets. Low diffusion keeps structure.
    crystalline: { bg: { speed: 5.5, sensorDist: 18, diffusion: 0.10, deposit: 18, decay: 0.950, turnSpeed: 22, trailBright: 1.6, foodCount: 16 },
                   ms: { speed: 3.0, sensorDist: 20, diffusion: 0.10, deposit: 5, decay: 0.920, turnSpeed: 18, trailBright: 0.9 } },
    // Soft ghostly haze. High diffusion, trails dissolve quickly.
    smoke:       { bg: { speed: 7.5, sensorDist: 28, diffusion: 0.45, deposit: 8,  decay: 0.972, turnSpeed: 30, trailBright: 1.0, foodCount: 8 },
                   ms: { speed: 3.5, sensorDist: 24, diffusion: 0.30, deposit: 3, decay: 0.930, turnSpeed: 24, trailBright: 0.7 } },
    // Dense branching networks, organic growth. The gold standard.
    coral:       { bg: { speed: 4.5, sensorDist: 30, diffusion: 0.18, deposit: 14, decay: 0.965, turnSpeed: 22, trailBright: 1.4, foodCount: 18 },
                   ms: { speed: 3.0, sensorDist: 26, diffusion: 0.20, deposit: 4, decay: 0.928, turnSpeed: 20, trailBright: 0.8 } },
    // Thin delicate threads, fast fade. Silk in water.
    silk:        { bg: { speed: 8.0, sensorDist: 20, diffusion: 0.30, deposit: 6,  decay: 0.942, turnSpeed: 28, trailBright: 1.8, foodCount: 10 },
                   ms: { speed: 3.5, sensorDist: 22, diffusion: 0.28, deposit: 3, decay: 0.922, turnSpeed: 22, trailBright: 0.9 } },
    // Long streaky paths, nervous energy. Lightning in a bottle.
    electric:    { bg: { speed: 9.0, sensorDist: 14, diffusion: 0.15, deposit: 10, decay: 0.955, turnSpeed: 34, trailBright: 1.5, foodCount: 14 },
                   ms: { speed: 3.8, sensorDist: 20, diffusion: 0.15, deposit: 4, decay: 0.925, turnSpeed: 26, trailBright: 0.8 } },
    // Wide flowing rivers, heavy. Lava lamp.
    flow:        { bg: { speed: 6.0, sensorDist: 26, diffusion: 0.42, deposit: 4,  decay: 0.938, turnSpeed: 20, trailBright: 0.8, foodCount: 6 },
                   ms: { speed: 3.2, sensorDist: 24, diffusion: 0.30, deposit: 3, decay: 0.920, turnSpeed: 18, trailBright: 0.6, densityMult: 0.5, trailMax: 150 } },
    // Tight clusters with bright nodes. Constellation map.
    spore:       { bg: { speed: 6.0, sensorDist: 12, diffusion: 0.20, deposit: 16, decay: 0.948, turnSpeed: 24, trailBright: 1.8, foodCount: 20 },
                   ms: { speed: 3.0, sensorDist: 20, diffusion: 0.18, deposit: 5, decay: 0.925, turnSpeed: 20, trailBright: 0.9 } },
};

const TEXTURE_NAMES = ['standard', 'crystalline', 'smoke', 'coral', 'silk', 'electric', 'flow', 'spore'];

const PALETTES = [
    { name: 'Ember',  mascot: ['#181208', '#E0B860', '#E8A070'], bg: ['#121010', '#9A8A55', '#8A7050'], chromatic: ['rgba(240,140,80,A)', 'rgba(80,180,220,A)'] },
    { name: 'Frost',  mascot: ['#0A1018', '#70B0E0', '#90C8E8'], bg: ['#0C1014', '#507898', '#608090'], chromatic: ['rgba(100,180,240,A)', 'rgba(180,120,220,A)'] },
    { name: 'Moss',   mascot: ['#0C1408', '#88C870', '#B0D890'], bg: ['#0C1210', '#608858', '#6A8060'], chromatic: ['rgba(120,220,100,A)', 'rgba(220,200,80,A)'] },

// HSL helpers for per-seed drift
function hexToHSL(hex) {
    let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
    let max = Math.max(r,g,b), min = Math.min(r,g,b), h, s, l = (max+min)/2;
    if (max === min) { h = s = 0; } else {
        let d = max - min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        if (max === r) h = ((g-b)/d + (g<b?6:0))/6;
        else if (max === g) h = ((b-r)/d+2)/6;
        else h = ((r-g)/d+4)/6;
    }
    return [h*360, s*100, l*100];
}

function hslToHex(h, s, l) {
    h = ((h%360)+360)%360; s = Math.max(0,Math.min(100,s))/100; l = Math.max(0,Math.min(100,l))/100;
    let c = (1-Math.abs(2*l-1))*s, x = c*(1-Math.abs((h/60)%2-1)), m = l-c/2;
    let r,g,b;
    if (h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
    else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else{r=c;g=0;b=x;}
    let toHex = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
    return '#' + toHex(r) + toHex(g) + toHex(b);
}

function driftColor(hex, hueDrift, satDrift, lumDrift) {
    let [h,s,l] = hexToHSL(hex);
    return hslToHex(h + hueDrift, s + satDrift, l + lumDrift);
}

// Seeded PRNG
let rngState;
function srng(s) { rngState = s | 0; }
function rng() {
    rngState = (rngState + 0x6D2B79F5) | 0;
    let t = Math.imul(rngState ^ (rngState >>> 15), 1 | rngState);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

function h2r(hex) {
    let r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? { r: parseInt(r[1], 16), g: parseInt(r[2], 16), b: parseInt(r[3], 16) } : { r: 100, g: 80, b: 30 };
}

function buildMask() {
    maskCanvasEl.width = MSIZE;
    maskCanvasEl.height = MSIZE;
    maskCtx.clearRect(0, 0, MSIZE, MSIZE);
    const s = MSIZE * 0.7;
    const mx = (MSIZE - s) / 2;
    const my = (MSIZE - s) / 2;
    maskCtx.drawImage(maskImg, mx, my, s, s);

    // Feathered mask — wide blur for gradual edge dissolution
    featheredMask = document.createElement('canvas');
    featheredMask.width = MSIZE;
    featheredMask.height = MSIZE;
    let fCtx = featheredMask.getContext('2d');
    fCtx.filter = 'blur(14px)';
    fCtx.drawImage(maskCanvasEl, 0, 0);
    fCtx.filter = 'none';

    // Edge distance map — 0 at edges, 1 deep inside. Used to fade deposit near boundaries.
    let maskData = maskCtx.getImageData(0, 0, MSIZE, MSIZE).data;
    edgeDistMap = new Float32Array(MSIZE * MSIZE);
    // First pass: binary mask
    let binary = new Uint8Array(MSIZE * MSIZE);
    for (let i = 0; i < MSIZE * MSIZE; i++) binary[i] = maskData[i * 4 + 3] > 30 ? 1 : 0;
    // Distance transform (approximate via iterative erosion layers)
    let dist = new Float32Array(MSIZE * MSIZE);
    for (let i = 0; i < MSIZE * MSIZE; i++) dist[i] = binary[i] ? 999 : 0;
    // Forward pass
    for (let y = 1; y < MSIZE - 1; y++) {
        for (let x = 1; x < MSIZE - 1; x++) {
            let i = y * MSIZE + x;
            if (dist[i] > 0) dist[i] = Math.min(dist[i], Math.min(dist[i-1], dist[i-MSIZE]) + 1);
        }
    }
    // Backward pass
    for (let y = MSIZE - 2; y > 0; y--) {
        for (let x = MSIZE - 2; x > 0; x--) {
            let i = y * MSIZE + x;
            if (dist[i] > 0) dist[i] = Math.min(dist[i], Math.min(dist[i+1], dist[i+MSIZE]) + 1);
        }
    }
    // Normalize with per-pixel noise so dissolution is ragged, not uniform
    let edgeFadeDepth = 30;
    // Low-frequency noise: sample every 8px, interpolate between
    let noiseGrid = 8;
    let nw = Math.ceil(MSIZE / noiseGrid) + 1;
    let nh = Math.ceil(MSIZE / noiseGrid) + 1;
    let noise = new Float32Array(nw * nh);
    for (let i = 0; i < noise.length; i++) noise[i] = rng() * 0.6 + 0.7; // 0.7 to 1.3
    for (let y = 0; y < MSIZE; y++) {
        for (let x = 0; x < MSIZE; x++) {
            let i = y * MSIZE + x;
            // Bilinear noise lookup
            let gx = x / noiseGrid, gy = y / noiseGrid;
            let gx0 = Math.floor(gx), gy0 = Math.floor(gy);
            let fx = gx - gx0, fy = gy - gy0;
            let gx1 = Math.min(gx0 + 1, nw - 1), gy1 = Math.min(gy0 + 1, nh - 1);
            let n = noise[gy0 * nw + gx0] * (1-fx)*(1-fy) + noise[gy0 * nw + gx1] * fx*(1-fy)
                  + noise[gy1 * nw + gx0] * (1-fx)*fy + noise[gy1 * nw + gx1] * fx*fy;
            edgeDistMap[i] = Math.min(1, (dist[i] * n) / edgeFadeDepth);
        }
    }

    // ── Build density map from mascot image ──
    // Combines edge detection + luminance contrast to create a guide field
    let imgData = maskCtx.getImageData(0, 0, MSIZE, MSIZE);
    let px = imgData.data;
    densityMap = new Float32Array(MSIZE * MSIZE);
    edgeFoods = [];

    // Pass 1: luminance
    let lum = new Float32Array(MSIZE * MSIZE);
    for (let i = 0; i < MSIZE * MSIZE; i++) {
        let r = px[i*4], g = px[i*4+1], b = px[i*4+2], a = px[i*4+3];
        lum[i] = a > 10 ? (r * 0.299 + g * 0.587 + b * 0.114) / 255 : 0;
    }

    // Pass 2: Sobel edge detection + luminance variance = density
    for (let y = 1; y < MSIZE - 1; y++) {
        for (let x = 1; x < MSIZE - 1; x++) {
            let idx = y * MSIZE + x;
            // Sobel gradient magnitude
            let gx = -lum[idx - MSIZE - 1] + lum[idx - MSIZE + 1]
                     -2*lum[idx - 1]        + 2*lum[idx + 1]
                     -lum[idx + MSIZE - 1]  + lum[idx + MSIZE + 1];
            let gy = -lum[idx - MSIZE - 1] - 2*lum[idx - MSIZE] - lum[idx - MSIZE + 1]
                     +lum[idx + MSIZE - 1]  + 2*lum[idx + MSIZE] + lum[idx + MSIZE + 1];
            let edge = Math.sqrt(gx * gx + gy * gy);

            // Density = edge strength (structural features) + base luminance
            densityMap[idx] = Math.min(1, edge * 3 + lum[idx] * 0.15);
        }
    }

    // Pass 3: find high-edge points as structural food sources
    // (eyes, cap outline, face border, stem edges)
    let candidates = [];
    for (let y = 4; y < MSIZE - 4; y += 3) {
        for (let x = 4; x < MSIZE - 4; x += 3) {
            let d = densityMap[y * MSIZE + x];
            if (d > 0.4) candidates.push({ x, y, d });
        }
    }
    // Sort by density, pick top N spread across the shape
    candidates.sort((a, b) => b.d - a.d);
    // Spatial filtering — don't cluster foods too close
    let minDist = MSIZE * 0.06;
    for (let c of candidates) {
        if (edgeFoods.length >= 30) break;
        let tooClose = false;
        for (let f of edgeFoods) {
            let dx = f.x - c.x, dy = f.y - c.y;
            if (Math.sqrt(dx*dx + dy*dy) < minDist) { tooClose = true; break; }
        }
        if (!tooClose) edgeFoods.push({ x: c.x, y: c.y, r: 100 });
    }

    // ── Build ASCII stencil grid from mascot image ──
    // Each cell stores luminance, alpha, edge strength, and a random reveal threshold
    let sCols = Math.floor(MSIZE / CELL_W);
    let sRows = Math.floor(MSIZE / CELL_H);
    stencilGrid = new Array(sCols * sRows);
    let imgPx = maskCtx.getImageData(0, 0, MSIZE, MSIZE).data;
    for (let row = 0; row < sRows; row++) {
        let sy = row * CELL_H + Math.floor(CELL_H / 2);
        for (let col = 0; col < sCols; col++) {
            let sx = col * CELL_W + Math.floor(CELL_W / 2);
            let si = (sy * MSIZE + sx) * 4;
            let r = imgPx[si], g = imgPx[si+1], b = imgPx[si+2], a = imgPx[si+3];
            let lumVal = a > 10 ? (r * 0.299 + g * 0.587 + b * 0.114) / 255 : 0;
            // Sample edge strength from density map (Sobel edges + luminance)
            let edgeVal = densityMap ? densityMap[sy * MSIZE + sx] : 0;
            // Also sample a small neighborhood for more robust edge detection per cell
            let edgeMax = edgeVal;
            for (let dy = -2; dy <= 2; dy++) {
                for (let dx = -2; dx <= 2; dx++) {
                    let ny = sy + dy * 2, nx = sx + dx * 2;
                    if (ny >= 0 && ny < MSIZE && nx >= 0 && nx < MSIZE && densityMap) {
                        edgeMax = Math.max(edgeMax, densityMap[ny * MSIZE + nx]);
                    }
                }
            }
            let reveal = a > 10 ? (1 - edgeVal * 0.6) * (0.3 + rng() * 0.7) : 2; // >1 = never
            stencilGrid[row * sCols + col] = { lum: lumVal, a: a / 255, reveal, r, g, b, edge: edgeMax };
        }
    }
}

function getMaskFoodPoints(count) {
    let points = [];
    let data = maskCtx.getImageData(0, 0, MSIZE, MSIZE).data;
    let opaque = [];
    for (let y = 0; y < MSIZE; y += 3) {
        for (let x = 0; x < MSIZE; x += 3) {
            if (data[(y * MSIZE + x) * 4 + 3] > 128) opaque.push({ x, y });
        }
    }
    for (let i = 0; i < count && opaque.length > 0; i++) {
        points.push(opaque[Math.floor(rng() * opaque.length)]);
    }
    return points;
}

// ═══════════════════════════════════════════════════════════════
//  GENERIC PHYSARUM ENGINE
// ═══════════════════════════════════════════════════════════════

function sampleT(trail, w, h, x, y) {
    let ix = Math.floor(x), iy = Math.floor(y);
    if (ix < 0 || ix >= w || iy < 0 || iy >= h) return 0;
    return trail[iy * w + ix];
}

class Agent {
    constructor(x, y, h) { this.x = x; this.y = y; this.h = h; }

    step(P, trail, foods, w, h, dmap, edmap) {
        let sL = this.sense(P, trail, w, h, -P.sensorAngle);
        let sC = this.sense(P, trail, w, h, 0);
        let sR = this.sense(P, trail, w, h, P.sensorAngle);

        // Density-guided steering: sense density at left/center/right and bias toward structure
        if (dmap) {
            let sd = P.sensorDist;
            let dL = sampleT(dmap, w, h, this.x + Math.cos(this.h - P.sensorAngle) * sd, this.y + Math.sin(this.h - P.sensorAngle) * sd);
            let dC = sampleT(dmap, w, h, this.x + Math.cos(this.h) * sd, this.y + Math.sin(this.h) * sd);
            let dR = sampleT(dmap, w, h, this.x + Math.cos(this.h + P.sensorAngle) * sd, this.y + Math.sin(this.h + P.sensorAngle) * sd);
            // Blend density signal into trail sensor readings
            sL += dL * 40;
            sC += dC * 40;
            sR += dR * 40;
        }

        // Food attraction
        if (foods && foods.length > 0) {
            let bd = Infinity, ba = 0;
            for (let f of foods) {
                let dx = f.x - this.x, dy = f.y - this.y;
                let d = Math.sqrt(dx * dx + dy * dy);
                if (d < (f.r || 150) && d < bd) { bd = d; ba = Math.atan2(dy, dx); }
            }
            if (bd < 150 && bd > 3) {
                let diff = ba - this.h;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                this.h += diff * Math.pow(1 - bd / 150, 2) * 0.12;
            }
        }

        if (sC > sL && sC > sR) { /* straight */ }
        else if (sC < sL && sC < sR) { this.h += (rng() < 0.5 ? P.turnSpeed : -P.turnSpeed); }
        else if (sL > sR) { this.h -= P.turnSpeed; }
        else if (sR > sL) { this.h += P.turnSpeed; }

        this.x += Math.cos(this.h) * P.speed;
        this.y += Math.sin(this.h) * P.speed;

        // Wrap
        if (this.x < 0) this.x += w; if (this.x >= w) this.x -= w;
        if (this.y < 0) this.y += h; if (this.y >= h) this.y -= h;

        let ix = Math.floor(this.x), iy = Math.floor(this.y);
        if (ix >= 0 && ix < w && iy >= 0 && iy < h) {
            // Density-guided deposit: more trail at structural features
            let dep = P.deposit;
            if (dmap) {
                let d = dmap[iy * w + ix] || 0;
                let dm = P.densityMult !== undefined ? P.densityMult : 1.0;
                dep = P.deposit * (0.5 + d * 2.5 * dm);
            }
            // Edge dissolution: fade deposit near mask boundaries
            if (edmap) {
                let ef = edmap[iy * w + ix] || 0;
                dep *= 0.15 + ef * 0.85; // 15% deposit at very edge, full at center
            }
            let tmax = P.trailMax || 255;
            trail[iy * w + ix] = Math.min(trail[iy * w + ix] + dep, tmax);
        }
    }

    sense(P, trail, w, h, offset) {
        let a = this.h + offset;
        return sampleT(trail, w, h, this.x + Math.cos(a) * P.sensorDist, this.y + Math.sin(a) * P.sensorDist);
    }
}

function diffuse(trail, trailPrev, w, h, diffusion, decay) {
    let tmp = trailPrev; trailPrev = trail; trail = tmp;
    let id = 1 - diffusion;
    for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
            let idx = y * w + x;
            let avg = (trailPrev[idx - 1] + trailPrev[idx + 1] + trailPrev[idx - w] + trailPrev[idx + w]) * 0.25;
            trail[idx] = (trailPrev[idx] * id + avg * diffusion) * decay;
        }
    }
    return { trail, trailPrev };
}

function spawnAgent(agents, cx, cy, spawnR) {
    let a = rng() * Math.PI * 2;
    let r = rng() * spawnR;
    agents.push(new Agent(cx + Math.cos(a) * r, cy + Math.sin(a) * r, a));
}

function seedTrail(trail, cx, cy, w, h, spawnR) {
    for (let dy = -spawnR; dy <= spawnR; dy++) {
        for (let dx = -spawnR; dx <= spawnR; dx++) {
            let dd = Math.sqrt(dx * dx + dy * dy);
            if (dd < spawnR) {
                let ix = Math.floor(cx + dx), iy = Math.floor(cy + dy);
                if (ix >= 0 && ix < w && iy >= 0 && iy < h) {
                    trail[iy * w + ix] = (1 - dd / spawnR) * 40;
                }
            }
        }
    }
}

function renderTrail(ctx, trail, w, h, P, colors) {
    colors = colors || COLORS;
    let base = h2r(colors[0]), bright = h2r(colors[1]), hot = h2r(colors[2]);

    // Clear to background color
    ctx.fillStyle = colors[0];
    ctx.fillRect(0, 0, w, h);

    let cellW = CELL_W;
    let cellH = CELL_H;
    let cols = Math.floor(w / cellW);
    let rows = Math.floor(h / cellH);
    let fontSize = cellH - 2;
    ctx.font = `${fontSize}px 'Courier New'`;
    ctx.textBaseline = 'top';
    ctx.textAlign = 'center';

    // Pulse factor: sine wave oscillation for brightness + ramp shift
    let pulse = Math.sin(pulsePhase);
    let brightMult = 1 + pulse * PULSE_BRIGHT;
    let rampShift = pulse * PULSE_RAMP;

    for (let row = 0; row < rows; row++) {
        let py = row * cellH + Math.floor(cellH / 2);
        for (let col = 0; col < cols; col++) {
            let px = col * cellW + Math.floor(cellW / 2);
            if (py >= h || px >= w) continue;
            let v = trail[py * w + px] * P.trailBright;

            // Skip empty cells
            if (v < 1) continue;

            // Pulsed brightness for color interpolation
            let vPulsed = v * brightMult;

            // Character from code buffer (tiled across grid), not density ramp
            let ch = CODE_BUF[(row * cols + col) % CODE_LEN];
            if (ch === ' ') ch = CODE_BUF[(row * cols + col + 7) % CODE_LEN];

            // Opacity: cubic ease so faint trails are very subtle, only hot trails pop
            let rawAlpha = Math.min(1, v / 50);
            let alpha = rawAlpha * rawAlpha * rawAlpha; // cubic falloff

            // 3-stop color interpolation, scaled for lower trail values
            let t = Math.min(vPulsed / 30, 1);
            let t2 = Math.min(vPulsed / 80, 1);
            let r, g, b;
            if (t2 > 0.3) {
                let ht = (t2 - 0.3) / 0.7;
                r = bright.r + (hot.r - bright.r) * ht;
                g = bright.g + (hot.g - bright.g) * ht;
                b = bright.b + (hot.b - bright.b) * ht;
            } else {
                r = base.r + (bright.r - base.r) * t;
                g = base.g + (bright.g - base.g) * t;
                b = base.b + (bright.b - base.b) * t;
            }

            ctx.globalAlpha = alpha;
            ctx.fillStyle = `rgb(${Math.min(255,r)|0},${Math.min(255,g)|0},${Math.min(255,b)|0})`;
            ctx.fillText(ch, col * cellW + Math.floor(cellW / 2), row * cellH);
        }
    }
    ctx.globalAlpha = 1;
}

// Pixel-based trail renderer — organic mold look, no ASCII characters
function renderTrailPixel(ctx, trail, w, h, P, colors) {
    let base = h2r(colors[0]), bright = h2r(colors[1]), hot = h2r(colors[2]);
    let imgData = ctx.createImageData(w, h);
    let px = imgData.data;
    let pulse = Math.sin(pulsePhase);
    let brightMult = 1 + pulse * PULSE_BRIGHT;

    let boost = _trailBoost || 1.0;
    for (let i = 0; i < w * h; i++) {
        let v = trail[i] * P.trailBright * boost;
        if (v < 0.5) {
            // Background color
            px[i*4] = base.r; px[i*4+1] = base.g; px[i*4+2] = base.b; px[i*4+3] = 255;
            continue;
        }
        let vP = v * brightMult;
        // Smooth alpha — quadratic for organic glow
        let rawA = Math.min(1, v / 40);
        let alpha = rawA * rawA;
        // Edge mask: if provided, multiply alpha by edge strength
        if (alpha < 0.01) {
            px[i*4] = base.r; px[i*4+1] = base.g; px[i*4+2] = base.b; px[i*4+3] = 255;
            continue;
        }
        // 3-stop color: base → bright → hot (hot only at high trail intensity)
        let t1 = Math.min(vP / 30, 1);
        let t2 = Math.min(vP / 80, 1);
        let r, g, b;
        if (t2 > 0.5) {
            let ht = (t2 - 0.5) / 0.5;
            r = bright.r + (hot.r - bright.r) * ht * 0.6;
            g = bright.g + (hot.g - bright.g) * ht * 0.6;
            b = bright.b + (hot.b - bright.b) * ht * 0.6;
        } else {
            r = base.r + (bright.r - base.r) * t1;
            g = base.g + (bright.g - base.g) * t1;
            b = base.b + (bright.b - base.b) * t1;
        }
        // Blend with background
        px[i*4]   = (base.r * (1 - alpha) + r * alpha) | 0;
        px[i*4+1] = (base.g * (1 - alpha) + g * alpha) | 0;
        px[i*4+2] = (base.b * (1 - alpha) + b * alpha) | 0;
        px[i*4+3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
}

function resize() {
    let screenW = window.innerWidth;
    let screenH = window.innerHeight;

    // On mobile: render at half resolution, CSS-scale to fill viewport
    if (IS_MOBILE) {
        VW = Math.floor(screenW * 0.75);
        VH = Math.floor(screenH * 0.75);
        // CSS stretches canvas to viewport
        bgCanvas.style.width = screenW + 'px';
        bgCanvas.style.height = screenH + 'px';
        mascotCanvas.style.width = ''; // sized by CSS position
        mascotCanvas.style.height = '';
    } else {
        VW = screenW;
        VH = screenH;
    }

    MSIZE = Math.floor(Math.min(VW, VH) * 0.5);
    // On mobile, mascot needs to be much bigger for the stencil to read
    if (IS_MOBILE) MSIZE = Math.max(MSIZE, Math.floor(Math.min(screenW, screenH) * 0.55));

    bgCanvas.width = VW; bgCanvas.height = VH;
    bgSimCanvas.width = VW; bgSimCanvas.height = VH;
    compositeCanvas.width = VW; compositeCanvas.height = VH;

    mascotCanvas.width = MSIZE; mascotCanvas.height = MSIZE;
    mascotSimCanvas.width = MSIZE; mascotSimCanvas.height = MSIZE;

    // Scale mascot canvas display to correct screen position
    if (IS_MOBILE) {
        let displayMsize = Math.floor(Math.min(screenW, screenH) * 0.5);
        mascotCanvas.style.width = displayMsize + 'px';
        mascotCanvas.style.height = displayMsize + 'px';
    }

    if (maskImg) buildMask();
}

function generateBgFoods() {
    bgFoods = [];
    let cx = VW / 2, cy = VH / 2;
    let minR = MSIZE * 0.5;
    let maxR = Math.max(VW, VH) * 0.55;
    for (let i = 0; i < BG.foodCount; i++) {
        let a = rng() * Math.PI * 2;
        let r = minR + rng() * (maxR - minR);
        bgFoods.push({
            x: cx + Math.cos(a) * r,
            y: cy + Math.sin(a) * r,
            r: 100 + rng() * 140
        });
    }
}

function setMode(m) {
    formationMode = m;
    document.querySelectorAll('.mode-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.mode) === m);
    });
    if (typeof updateShareURL === 'function') updateShareURL();
}

// Slider value display helper — show sensible precision
function sv(el) {
    let vd = document.getElementById(el.id + '-v');
    if (!vd) return;
    let v = parseFloat(el.value);
    let step = parseFloat(el.step) || 1;
    if (step >= 1) vd.textContent = Math.round(v);
    else if (step >= 0.1) vd.textContent = v.toFixed(1);
    else if (step >= 0.01) vd.textContent = v.toFixed(2);
    else vd.textContent = v.toFixed(3);
}

// Sync all sliders to current param values
function syncSliders() {
    function set(id, val) {
        let el = document.getElementById(id);
        if (el) {
            // Snap value to nearest slider step so display matches
            let step = parseFloat(el.step) || 1;
            let snapped = Math.round(val / step) * step;
            el.value = snapped;
            sv(el);
        }
    }
    set('s-seed', seed);
    // BG
    set('s-bg-agentCount', BG.agentCount);
    set('s-bg-speed', BG.speed);
    set('s-bg-sensorDist', BG.sensorDist);
    set('s-bg-sensorAngle', BG.sensorAngle * 180 / Math.PI);
    set('s-bg-turnSpeed', BG.turnSpeed * 180 / Math.PI);
    set('s-bg-stepsPerFrame', BG.stepsPerFrame);
    set('s-bg-spawnRate', BG.spawnRate);
    set('s-bg-deposit', BG.deposit);
    set('s-bg-decay', BG.decay);
    set('s-bg-diffusion', BG.diffusion);
    set('s-bg-trailBright', BG.trailBright);
    set('s-bg-agentGlow', BG.agentGlow);
    set('s-bg-foodCount', BG.foodCount);
    set('s-bg-foodStr', BG.foodStr);
    set('s-bg-spawnR', BG.spawnR);
    // MS
    set('s-ms-agentCount', MS.agentCount);
    set('s-ms-speed', MS.speed);
    set('s-ms-sensorDist', MS.sensorDist);
    set('s-ms-sensorAngle', MS.sensorAngle * 180 / Math.PI);
    set('s-ms-turnSpeed', MS.turnSpeed * 180 / Math.PI);
    set('s-ms-stepsPerFrame', MS.stepsPerFrame);
    set('s-ms-spawnRate', MS.spawnRate);
    set('s-ms-deposit', MS.deposit);
    set('s-ms-decay', MS.decay);
    set('s-ms-diffusion', MS.diffusion);
    set('s-ms-trailBright', MS.trailBright);
    set('s-ms-agentGlow', MS.agentGlow);
    set('s-ms-spawnR', MS.spawnR);
    // Stencil
    set('s-stencilMaster', window._stencilMaster ?? 0.28);
    set('s-edgeStrong', window._edgeStrong ?? 0.3);
    set('s-edgeWeak', window._edgeWeak ?? 0.12);
    set('s-pulseSpeed', window._pulseSpeed ?? PULSE_SPEED);
}

function initAll() {
    selectPalette(seed);
    srng(seed);

    // Shuffle code buffer with seeded RNG so each seed gets unique code layout
    CODE_BUF = CODE_SRC.slice();
    for (let i = CODE_LEN - 1; i > 0; i--) {
        let j = Math.floor(rng() * (i + 1));
        let tmp = CODE_BUF[i]; CODE_BUF[i] = CODE_BUF[j]; CODE_BUF[j] = tmp;
    }

    // ── Background sim — network radiates from mascot ring to edges ──
    bgCx = VW / 2;
    bgCy = VH / 2;
    bgFc = 0;
    bgAgents = [];
    bgTrail = new Float32Array(VW * VH);
    bgTrailPrev = new Float32Array(VW * VH);
    generateBgFoods();
    // Seed trail on the spawn ring and at food targets
    let spawnRingR = MSIZE * 0.35;
    for (let i = 0; i < 48; i++) {
        let a = (i / 48) * Math.PI * 2;
        seedTrail(bgTrail, bgCx + Math.cos(a) * spawnRingR, bgCy + Math.sin(a) * spawnRingR, VW, VH, 10);
    }
    for (let f of bgFoods) seedTrail(bgTrail, f.x, f.y, VW, VH, 8);
    // Spawn agents on the ring, facing outward toward food sources
    for (let i = 0; i < BG.initialBatch; i++) {
        let a = rng() * Math.PI * 2;
        let r = spawnRingR + (rng() - 0.5) * 20;
        let sx = bgCx + Math.cos(a) * r;
        let sy = bgCy + Math.sin(a) * r;
        bgAgents.push(new Agent(sx, sy, a + (rng() - 0.5) * 0.8));
    }
    bgSimCtx.fillStyle = '#0D0D0D';
    bgSimCtx.fillRect(0, 0, VW, VH);

    // ── Mascot sim ──
    msCx = MSIZE / 2;
    msCy = MSIZE / 2;
    msFc = 0;
    msAgents = [];
    msTrail = new Float32Array(MSIZE * MSIZE);
    msTrailPrev = new Float32Array(MSIZE * MSIZE);
    seedTrail(msTrail, msCx, msCy, MSIZE, MSIZE, MS.spawnR);
    // Use edge-detected structural food sources instead of random
    msFoods = edgeFoods.length > 0 ? edgeFoods : getMaskFoodPoints(25);
    for (let f of msFoods) seedTrail(msTrail, f.x, f.y, MSIZE, MSIZE, 6);

    // Pre-seed trail along density map so agents immediately follow structure
    if (densityMap) {
        for (let i = 0; i < MSIZE * MSIZE; i++) {
            msTrail[i] += densityMap[i] * 15;
        }
    }
    for (let i = 0; i < MS.initialBatch; i++) spawnAgent(msAgents, msCx, msCy, MS.spawnR);
    mascotSimCtx.fillStyle = '#0D0D0D';
    mascotSimCtx.fillRect(0, 0, MSIZE, MSIZE);
}

// ═══════════════════════════════════════════════════════════════
//  FRAME
// ═══════════════════════════════════════════════════════════════

function frame() {
    if (!running) return;
    bgFc++; msFc++;
    pulsePhase += (window._pulseSpeed ?? PULSE_SPEED);

    // Shared formation factor: drives both trail inflow and mascot illumination
    // On mobile, form stencil in ~8 frames instead of 18 (mobile fps is lower)
    let stencilEnd = IS_MOBILE ? 45 : STENCIL_END;
    let formationLinear = Math.min(1, Math.max(0, (msFc - STENCIL_START) / (stencilEnd - STENCIL_START)));
    // Ease-in: starts ghostly, gradually solidifies
    let formation = formationLinear * formationLinear;

    // ── Background sim step — spawn from mascot ring, radiating outward ──
    if (bgAgents.length < BG.agentCount) {
        let n = Math.min(BG.spawnRate, BG.agentCount - bgAgents.length);
        let ringR = MSIZE * 0.35;
        for (let i = 0; i < n; i++) {
            let a = rng() * Math.PI * 2;
            let r = ringR + (rng() - 0.5) * 20;
            bgAgents.push(new Agent(bgCx + Math.cos(a) * r, bgCy + Math.sin(a) * r, a + (rng() - 0.5) * 0.8));
        }
    }
    for (let s = 0; s < BG.stepsPerFrame; s++) {
        for (let a of bgAgents) a.step(BG, bgTrail, bgFoods, VW, VH);
    }
    let bgD = diffuse(bgTrail, bgTrailPrev, VW, VH, BG.diffusion, BG.decay);
    bgTrail = bgD.trail; bgTrailPrev = bgD.trailPrev;

    // Gentle suppression right at mascot center so trails don't pile up under the stencil
    let fadeR = MSIZE * 0.22;
    let fadeR2 = fadeR * fadeR;
    let yMin = Math.max(0, Math.floor(bgCy - fadeR)), yMax = Math.min(VH - 1, Math.ceil(bgCy + fadeR));
    let xMin = Math.max(0, Math.floor(bgCx - fadeR)), xMax = Math.min(VW - 1, Math.ceil(bgCx + fadeR));
    for (let y = yMin; y <= yMax; y++) {
        let dy = y - bgCy;
        for (let x = xMin; x <= xMax; x++) {
            let dx = x - bgCx;
            let d2 = dx * dx + dy * dy;
            if (d2 < fadeR2) {
                let f = Math.sqrt(d2) / fadeR; // 0 at center, 1 at edge
                bgTrail[y * VW + x] *= 0.3 + f * 0.7; // gentle: 30% at center, 100% at edge
            }
        }
    }

    // ── Mascot sim step ──
    if (msAgents.length < MS.agentCount) {
        let n = Math.min(MS.spawnRate, MS.agentCount - msAgents.length);
        for (let i = 0; i < n; i++) spawnAgent(msAgents, msCx, msCy, MS.spawnR);
    }
    for (let s = 0; s < MS.stepsPerFrame; s++) {
        for (let a of msAgents) a.step(MS, msTrail, msFoods, MSIZE, MSIZE, densityMap, edgeDistMap);
    }
    let msD = diffuse(msTrail, msTrailPrev, MSIZE, MSIZE, MS.diffusion, MS.decay);
    msTrail = msD.trail; msTrailPrev = msD.trailPrev;

    // ── Render background ──
    renderTrail(bgSimCtx, bgTrail, VW, VH, BG, BG_COLORS);
    bgCtx.drawImage(bgSimCanvas, 0, 0);

    // Atmospheric vignette — dark falloff centered on mascot, creates depth
    let vigR = Math.max(VW, VH) * 0.55;
    let grad = bgCtx.createRadialGradient(VW/2, VH/2, MSIZE * 0.2, VW/2, VH/2, vigR);
    let vigFade = Math.min(1, bgFc * 0.008);
    grad.addColorStop(0, `rgba(13,13,13,${0.15 * vigFade})`);
    grad.addColorStop(0.5, `rgba(13,13,13,${0.08 * vigFade})`);
    grad.addColorStop(1, 'rgba(13,13,13,0)');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, VW, VH);

    // ── Render mascot — mode determines visual style ──
    // Mode 1: Ramp — ASCII density characters (stencil overlay)
    // Mode 2: Contour — pixel trails only at edges, neon wireframe
    // Mode 2: Code — scrolling trading code characters in mascot shape
    // Mode 3: Mold — pure physarum pixel glow, no ASCII
    // Mode 4: Hybrid — pixel mold base + faint ASCII stencil on top

    if (formationMode === 3) {
        // MOLD: pure organic pixel trails — no ASCII at all
        renderTrailPixel(mascotSimCtx, msTrail, MSIZE, MSIZE, MS, COLORS);
    } else if (formationMode === 4) {
        // HYBRID: pixel mold base, then ASCII overlaid below
        renderTrailPixel(mascotSimCtx, msTrail, MSIZE, MSIZE, MS, COLORS);
    } else {
        // Modes 1 & 2: ASCII trail base
        renderTrail(mascotSimCtx, msTrail, MSIZE, MSIZE, MS, COLORS);
    }
    // ── ASCII stencil overlay (modes 1, 2, 4 — mode 3 is pure pixel) ──
    let STENCIL_MASTER = window._stencilMaster ?? 0.28;
    let isBlast = STENCIL_MASTER > 1.0;
    if (stencilGrid && (isBlast || formation > 0) && (formationMode === 1 || formationMode === 2 || formationMode === 4)) {
        let EDGE_STRONG = window._edgeStrong ?? 0.3;
        let EDGE_WEAK   = window._edgeWeak ?? 0.12;

        let cw = IS_MOBILE ? 6 : CELL_W;
        let ch_ = IS_MOBILE ? 10 : CELL_H;
        let sCols = Math.floor(MSIZE / cw);
        let sRows = Math.floor(MSIZE / ch_);
        let pulse = Math.sin(pulsePhase);
        let rampShift = pulse * PULSE_RAMP * 0.6;
        let bright = h2r(COLORS[1]), hot = h2r(COLORS[2]);

        mascotSimCtx.font = `${ch_ - 2}px 'Courier New'`;
        mascotSimCtx.textBaseline = 'top';
        mascotSimCtx.textAlign = 'center';

        let origCols = Math.floor(MSIZE / CELL_W);
        let origRows = Math.floor(MSIZE / CELL_H);
        // Scroll offset for Code mode (mode 3)
        let codeScroll = formationMode === 2 ? Math.floor(msFc * 0.15) : 0;

        for (let row = 0; row < sRows; row++) {
            for (let col = 0; col < sCols; col++) {
                let gridCol = Math.min(origCols - 1, Math.floor((col * cw + cw / 2) / CELL_W));
                let gridRow = Math.min(origRows - 1, Math.floor((row * ch_ + ch_ / 2) / CELL_H));
                let cell = stencilGrid[gridRow * origCols + gridCol];
                if (!cell || cell.a < 0.1) continue;
                if (!isBlast && formation < cell.reveal) continue;

                let isEdge = cell.edge >= EDGE_STRONG;
                let isMidEdge = cell.edge >= EDGE_WEAK;
                let isDarkFeature = cell.a > 0.3 && cell.lum < 0.12;
                let cellBlend = isBlast ? 1.0 : Math.min(1, (formation - cell.reveal) / 0.3);
                let lumPulsed = cell.lum + pulse * 0.15;

                let ch;
                let skipCell = false;
                let alphaBoost = 1.0;

                if (isDarkFeature && !isEdge) { continue; }
                let nearDark = false;
                if (isEdge) {
                    for (let dy = -1; dy <= 1 && !nearDark; dy++) {
                        for (let dx = -1; dx <= 1 && !nearDark; dx++) {
                            let nc = gridCol + dx, nr = gridRow + dy;
                            if (nc >= 0 && nc < origCols && nr >= 0 && nr < origRows) {
                                let neighbor = stencilGrid[nr * origCols + nc];
                                if (neighbor && neighbor.a > 0.3 && neighbor.lum < 0.12) nearDark = true;
                            }
                        }
                    }
                }

                if (formationMode === 1) {
                    // RAMP: density symbols, edges heavier
                    let edgeBonus = isEdge ? 2 : (isMidEdge ? 1 : 0);
                    let rampIdx = Math.floor((lumPulsed + cell.edge) * (CHAR_RAMP.length - 1) + rampShift + edgeBonus);
                    rampIdx = Math.max(1, Math.min(CHAR_RAMP.length - 1, rampIdx));
                    ch = CHAR_RAMP[rampIdx];
                    if (!isMidEdge && (row + col) % 3 !== 0) { skipCell = true; }
                    alphaBoost = isEdge ? 1.8 : (isMidEdge ? 0.9 : 0.4);

                } else if (formationMode === 2) {
                    // CODE: scrolling trading code fills the mascot shape
                    let scrollIdx = ((row + codeScroll) * sCols + col) % CODE_LEN;
                    ch = CODE_BUF[scrollIdx];
                    if (ch === ' ') ch = CODE_BUF[(scrollIdx + 7) % CODE_LEN];
                    if (!isMidEdge && (row + col) % 2 !== 0) { skipCell = true; }
                    alphaBoost = isEdge ? 2.0 : (isMidEdge ? 1.2 : 0.6);

                } else if (formationMode === 4) {
                    // HYBRID: ASCII overlay on pixel mold base
                    let scrollIdx = ((row + codeScroll) * sCols + col) % CODE_LEN;
                    ch = CODE_BUF[scrollIdx];
                    if (ch === ' ') ch = CODE_BUF[(scrollIdx + 13) % CODE_LEN];
                    if (!isMidEdge && (row + col) % 2 !== 0) { skipCell = true; }
                    alphaBoost = isEdge ? 1.5 : (isMidEdge ? 0.8 : 0.4);
                }

                if (nearDark) { alphaBoost = Math.max(alphaBoost, 2.5); }

                // Blast mode: fill every cell at full brightness
                let blast = STENCIL_MASTER > 1.0;
                if (blast && skipCell) {
                    skipCell = false;
                    let rampIdx = Math.max(1, Math.floor(lumPulsed * (CHAR_RAMP.length - 1)));
                    ch = CHAR_RAMP[Math.min(CHAR_RAMP.length - 1, rampIdx)];
                    alphaBoost = 0.6;
                }
                if (skipCell) continue;

                let r, g, b;
                if (blast) {
                    // Red→white color ramp for dramatic face reveal
                    let t = Math.min(1, lumPulsed * 1.3);
                    if (t < 0.5) {
                        let lt = t / 0.5;
                        r = 60 + 195 * lt; g = 10 + 40 * lt; b = 10 + 30 * lt;
                    } else {
                        let ht = (t - 0.5) / 0.5;
                        r = 255; g = 50 + 205 * ht; b = 40 + 215 * ht;
                    }
                    let whiten = Math.min(0.4, (STENCIL_MASTER - 1.0) * 0.15);
                    r = r + (255 - r) * whiten; g = g + (255 - g) * whiten; b = b + (255 - b) * whiten;
                } else {
                    let colorPush = STENCIL_MASTER * 2.5;
                    let lumT = Math.min(1, lumPulsed * (0.9 + colorPush * 0.3));
                    let hotMix = 0.3 + colorPush * 0.35;
                    let baseMix = 0.5 + colorPush * 0.25;
                    let t = 0.2 + lumT * (0.4 + colorPush * 0.15);
                    if (t > 0.5) {
                        let ht = (t - 0.5) / 0.5;
                        r = bright.r + (hot.r - bright.r) * ht * hotMix;
                        g = bright.g + (hot.g - bright.g) * ht * hotMix;
                        b = bright.b + (hot.b - bright.b) * ht * hotMix;
                    } else {
                        let bt = t / 0.5;
                        r = bright.r * bt * baseMix + bright.r * 0.15;
                        g = bright.g * bt * baseMix + bright.g * 0.15;
                        b = bright.b * bt * baseMix + bright.b * 0.15;
                    }
                }

                // Always quadratic — gives dramatic blast contrast
                let masterAlpha = STENCIL_MASTER * (1 + STENCIL_MASTER);
                let alphaFloor = blast ? 0.3 : 0;
                let finalAlpha = Math.min(1, Math.max(alphaFloor, cellBlend * cell.a * masterAlpha * alphaBoost));
                mascotSimCtx.globalAlpha = finalAlpha;
                mascotSimCtx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
                mascotSimCtx.fillText(ch, col * cw + Math.floor(cw / 2), row * ch_);
            }
        }
        mascotSimCtx.globalAlpha = 1;
    }

    mascotCtx.clearRect(0, 0, MSIZE, MSIZE);
    mascotCtx.drawImage(mascotSimCanvas, 0, 0);

    // Feathered mask — blur the alpha edges for soft bleed
    mascotCtx.globalCompositeOperation = 'destination-in';
    mascotCtx.drawImage(featheredMask, 0, 0);
    mascotCtx.globalCompositeOperation = 'source-over';


    bgCtx.restore();

    // ── Composite for recording ──
    if (isRecording) {
        compCtx.drawImage(bgCanvas, 0, 0);
        let mx = (VW - MSIZE) / 2;
        let my = (VH - MSIZE) / 2;
        compCtx.drawImage(mascotCanvas, mx, my);
        drawSeedWatermark(compCtx, VW, VH);
    }

    if (msFc === 1) {
        statusEl.textContent = `${seed} · ${activePalette.name} · ${activeTextureName}`;
        statusEl.classList.add('show');
        clearTimeout(statusEl._fadeTimer);
        statusEl._fadeTimer = setTimeout(() => statusEl.classList.remove('show'), 3000);
        // Update HTML watermark + restart hint animation
        document.getElementById('watermark').textContent = seed;
        let hintEl = document.getElementById('hint');
        hintEl.textContent = IS_MOBILE ? 'tap & hold' : 'hold ␣';
        hintEl.style.animation = 'none';
        hintEl.offsetHeight; // force reflow
        hintEl.style.animation = 'hintFade 6s ease-out forwards';
    }
    requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════════════════════
//  RECORDING
// ═══════════════════════════════════════════════════════════════

let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;

function toggleRecord() {
    if (isRecording) stopRecord();
    else startRecord();
}

function startRecord() {
    // Make composite visible for capture
    compositeCanvas.style.opacity = '1';
    compositeCanvas.style.zIndex = '5';

    let stream = compositeCanvas.captureStream(60);
    recordedChunks = [];
    let mimeType = 'video/webm;codecs=vp9';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        let blob = new Blob(recordedChunks, { type: 'video/webm' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `shumi-masked-${seed}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        compositeCanvas.style.opacity = '0';
        compositeCanvas.style.zIndex = '-1';
    };
    mediaRecorder.start(100);
    isRecording = true;
    document.getElementById('rec-btn').textContent = '■ Stop';
    document.getElementById('rec-btn').classList.add('active');
}

function stopRecord() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    document.getElementById('rec-btn').textContent = '● Record';
    document.getElementById('rec-btn').classList.remove('active');
}

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════

function restart() {
    let seedEl = document.getElementById('s-seed');
    if (seedEl && seedEl === document.activeElement) {
        seed = parseInt(seedEl.value) || 1;
    } else {
        seed = Math.floor(Math.random() * 999999) + 1;
    }
    initAll();
    syncSliders();
    updateShareURL();
    if (!running) { running = true; requestAnimationFrame(frame); }

}

function copyLink() {
    updateShareURL();
    let url = window.location.origin + window.location.pathname + window.location.search;
    navigator.clipboard.writeText(url).then(() => {
        let btn = document.querySelector('[onclick="copyLink()"]');
        let orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
    }).catch(() => {
        // Fallback for HTTP/non-secure contexts
        prompt('Copy this link:', window.location.href);
    });
}

function drawSeedWatermark(ctx, w, h) {
    ctx.save();
    ctx.font = '11px "Courier New"';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#fff';
    ctx.fillText(seed, w - 10, h - 8);
    ctx.restore();
}

function savePNG() {
    // Render at 4K (3840×2160) regardless of viewport size
    const EW = 3840, EH = 2160;
    let exportC = document.createElement('canvas');
    exportC.width = EW; exportC.height = EH;
    let ectx = exportC.getContext('2d');
    ectx.imageSmoothingEnabled = true;
    ectx.imageSmoothingQuality = 'high';
    // Scale BG to fill 4K
    ectx.drawImage(bgCanvas, 0, 0, EW, EH);
    // Scale mascot proportionally — keep same relative size & centering
    let mScale = Math.min(EW / VW, EH / VH);
    let mW = MSIZE * mScale, mH = MSIZE * mScale;
    let mx = (EW - mW) / 2;
    let my = (EH - mH) / 2;
    ectx.drawImage(mascotCanvas, mx, my, mW, mH);
    drawSeedWatermark(ectx, EW, EH);
    let a = document.createElement('a');
    a.download = `shumi-masked-${seed}.png`;
    a.href = exportC.toDataURL('image/png');
    a.click();
}

window.addEventListener('resize', () => {
    resize();
    initAll();
});

// Hold Space to flash — boosts stencil (ASCII modes) + trail brightness (pixel modes)
let _savedMaster = null;
let _trailBoost = 1.0;  // multiplier for pixel trail rendering during flash

// Auto-flash: briefly reveal the face so every visitor immediately sees the character
let _autoFlashTimer = null;
let _autoFlashFadeTimer = null;
function autoFlash() {
    if (_autoFlashTimer) clearTimeout(_autoFlashTimer);
    if (_autoFlashFadeTimer) clearTimeout(_autoFlashFadeTimer);
    let prev = window._stencilMaster ?? 0.28;
    let delay = IS_MOBILE ? 400 : 600;
    _autoFlashTimer = setTimeout(() => {
        // Don't override a manual spacebar hold
        if (_savedMaster !== null) return;
        window._stencilMaster = 2.5;
        _trailBoost = 3.0;
        _autoFlashFadeTimer = setTimeout(() => {
            // Don't reset if user is holding spacebar
            if (_savedMaster !== null) return;
            window._stencilMaster = prev;
            _trailBoost = 1.0;
        }, 1500);
    }, delay);
}
let _blastTimer = null;
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !e.target.matches('input, textarea, select')) {
        e.preventDefault();
        // Tap to flash: blast briefly then auto-restore
        if (_blastTimer) clearTimeout(_blastTimer);
        if (_autoFlashTimer) clearTimeout(_autoFlashTimer);
        if (_autoFlashFadeTimer) clearTimeout(_autoFlashFadeTimer);
        let prev = _savedMaster ?? window._stencilMaster ?? 0.28;
        _savedMaster = prev;
        window._stencilMaster = 3.0;
        _trailBoost = 4.0;
        _blastTimer = setTimeout(() => {
            window._stencilMaster = prev;
            _trailBoost = 1.0;
            _savedMaster = null;
            _blastTimer = null;
        }, 1500);
    }
});

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════

async function boot() {
    // Apply URL settings before init
    if (_urlMode) { formationMode = parseInt(_urlMode) || 1; setMode(formationMode); }
    if (_urlMaster) window._stencilMaster = parseFloat(_urlMaster);
    if (_urlEdgeS) window._edgeStrong = parseFloat(_urlEdgeS);
    if (_urlEdgeW) window._edgeWeak = parseFloat(_urlEdgeW);

    await loadMascot();
    resize();
    initAll();
    syncSliders();
    updateShareURL();
    running = true;
    requestAnimationFrame(frame);
}

function updateShareURL() {
    let p = new URLSearchParams();
    p.set('seed', seed);
    if (formationMode !== 1) p.set('mode', formationMode);
    let m = window._stencilMaster;
    if (m !== undefined && m !== 0.28) p.set('master', m.toFixed(2));
    let es = window._edgeStrong;
    if (es !== undefined && es !== 0.3) p.set('es', es.toFixed(2));
    let ew = window._edgeWeak;
    if (ew !== undefined && ew !== 0.12) p.set('ew', ew.toFixed(2));
    history.replaceState(null, '', '?' + p.toString());
}

boot();
</script>
