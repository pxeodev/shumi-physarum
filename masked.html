<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shumi</title>
    <meta property="og:title" content="shumi">
    <meta property="og:description" content="physarum simulation. each seed is different.">
    <meta property="og:image" content="https://haddencarpenter.github.io/shumi-physarum/og-thumbnail.png">
    <meta property="og:url" content="https://haddencarpenter.github.io/shumi-physarum/masked.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="shumi">
    <meta name="twitter:description" content="physarum simulation. each seed is different.">
    <meta name="twitter:image" content="https://haddencarpenter.github.io/shumi-physarum/og-thumbnail.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0D0D0D; overflow: hidden; font-family: 'Courier New', monospace; }
        /* Background physarum — fills entire viewport */
        #bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
        /* Ghost afterimage — barely perceptible original mascot, burned retina effect */
        #ghost-layer {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1;
            opacity: 0; transition: opacity 0.6s ease-out;
            pointer-events: none;
        }
        #ghost-layer.visible { opacity: 1; }
        /* Mascot layer — centered, chromatic orbit */
        #mascot-layer {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2;
            animation: chromatic-orbit 6s linear infinite, breathe 5s ease-in-out infinite;
            opacity: 0;
        }
        #mascot-layer.entered { animation: entrance 1.2s cubic-bezier(0.16,1,0.3,1) forwards, chromatic-orbit 6s linear 1.2s infinite, breathe 5s ease-in-out 1.2s infinite; }
        @keyframes entrance {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
        }
        @keyframes breathe {
            0%   { transform: translate(-50%, -50%) scale(1.0); }
            50%  { transform: translate(-50%, -50%) scale(1.03); }
            100% { transform: translate(-50%, -50%) scale(1.0); }
        }
        @keyframes chromatic-orbit {
            0%   { filter: drop-shadow(5px 0 3px rgba(255,60,40,0.30)) drop-shadow(-5px 0 3px rgba(40,220,255,0.30)); }
            25%  { filter: drop-shadow(0 5px 3px rgba(255,60,40,0.30)) drop-shadow(0 -5px 3px rgba(40,220,255,0.30)); }
            50%  { filter: drop-shadow(-5px 0 3px rgba(255,60,40,0.30)) drop-shadow(5px 0 3px rgba(40,220,255,0.30)); }
            75%  { filter: drop-shadow(0 -5px 3px rgba(255,60,40,0.30)) drop-shadow(0 5px 3px rgba(40,220,255,0.30)); }
            100% { filter: drop-shadow(5px 0 3px rgba(255,60,40,0.30)) drop-shadow(-5px 0 3px rgba(40,220,255,0.30)); }
        }

        /* Subtle chromatic on background too — slower, dimmer */
        #bg {
            animation: bg-chromatic 14s linear infinite;
        }
        @keyframes bg-chromatic {
            0%   { filter: drop-shadow(3px 0 1px rgba(255,60,40,0.08)) drop-shadow(-3px 0 1px rgba(40,220,255,0.08)); }
            50%  { filter: drop-shadow(-3px 0 1px rgba(255,60,40,0.08)) drop-shadow(3px 0 1px rgba(40,220,255,0.08)); }
            100% { filter: drop-shadow(3px 0 1px rgba(255,60,40,0.08)) drop-shadow(-3px 0 1px rgba(40,220,255,0.08)); }
        }
        /* Hidden work canvases */
        .hidden-canvas { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; width: 0; height: 0; overflow: hidden; }
        /* Composite output for recording */
        #composite { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; opacity: 0; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 10;
        }
        .btn {
            padding: 10px 20px; border: 1px solid #333; background: rgba(13,13,13,0.88);
            color: #D4A84B; font-family: 'Courier New', monospace; font-size: 13px;
            cursor: pointer; border-radius: 4px; transition: all 0.25s; backdrop-filter: blur(10px);
            box-shadow: 0 1px 4px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .btn:hover { border-color: #D4A84B; background: rgba(212,168,75,0.12); box-shadow: 0 2px 8px rgba(212,168,75,0.08), inset 0 1px 0 rgba(255,255,255,0.03); }
        .btn.active { border-color: #ff4444; color: #ff4444; }
        #status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #777; font-size: 12px; opacity: 0; z-index: 10;
            transition: opacity 0.8s;
            letter-spacing: 3px;
            text-transform: lowercase;
        }
        #status.show { opacity: 0.5; }
    </style>
</head>
<body>
    <!-- Background physarum: full viewport -->
    <canvas id="bg"></canvas>
    <!-- Ghost afterimage: barely perceptible original mascot, fades as trails build -->
    <canvas id="ghost-layer"></canvas>
    <!-- Mascot masked physarum: square, centered -->
    <canvas id="mascot-layer"></canvas>
    <!-- Hidden work canvases -->
    <div class="hidden-canvas">
        <canvas id="bg-sim"></canvas>
        <canvas id="mascot-sim"></canvas>
        <canvas id="mask-canvas"></canvas>
    </div>
    <!-- Composite for recording -->
    <canvas id="composite"></canvas>

    <div id="status"></div>
    <div id="controls">
        <button class="btn" onclick="restart()">New Seed</button>
        <button class="btn" id="rec-btn" onclick="toggleRecord()">● Record</button>
        <button class="btn" onclick="savePNG()">Save PNG</button>
        <a href="https://coinrotator.gitbook.io/coinrotator-docs/physarum-generator/" target="_blank" rel="noopener" class="btn" style="text-decoration:none;">? Docs</a>
    </div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════

// ── Palette families ──
// Each: { name, mascot: [dark, mid, hot], bg: [dark, mid, hot], chromatic: [warm, cool] }
// Texture profiles: define how trails behave per palette
// bg/ms overrides are applied on top of base BG/MS params
const TEXTURES = {
    // Warm, steady glow. Medium everything, the baseline.
    standard:    { bg: { speed: 5.0, sensorDist: 22, diffusion: 0.25, deposit: 12, decay: 0.968, turnSpeed: 20, trailBright: 1.2, foodCount: 12 },
                   ms: { speed: 4.0, sensorDist: 16, diffusion: 0.20, deposit: 16, decay: 0.975, turnSpeed: 18, trailBright: 2.8 } },
    // Sharp defined veins, gem-like facets. Low diffusion, high deposit.
    crystalline: { bg: { speed: 4.0, sensorDist: 18, diffusion: 0.10, deposit: 18, decay: 0.958, turnSpeed: 16, trailBright: 1.6, foodCount: 16 },
                   ms: { speed: 3.5, sensorDist: 12, diffusion: 0.08, deposit: 22, decay: 0.965, turnSpeed: 14, trailBright: 3.2 } },
    // Soft ghostly haze. High diffusion, low deposit, trails dissolve.
    smoke:       { bg: { speed: 5.5, sensorDist: 28, diffusion: 0.45, deposit: 8,  decay: 0.980, turnSpeed: 24, trailBright: 0.9, foodCount: 8 },
                   ms: { speed: 4.5, sensorDist: 22, diffusion: 0.38, deposit: 10, decay: 0.985, turnSpeed: 22, trailBright: 2.2 } },
    // Dense branching networks, slow organic growth. Coral reef.
    coral:       { bg: { speed: 3.0, sensorDist: 30, diffusion: 0.18, deposit: 14, decay: 0.972, turnSpeed: 15, trailBright: 1.4, foodCount: 18 },
                   ms: { speed: 2.5, sensorDist: 24, diffusion: 0.15, deposit: 18, decay: 0.978, turnSpeed: 13, trailBright: 3.0 } },
    // Thin delicate threads, fast fade. Silk in water.
    silk:        { bg: { speed: 6.0, sensorDist: 20, diffusion: 0.30, deposit: 6,  decay: 0.950, turnSpeed: 22, trailBright: 1.8, foodCount: 10 },
                   ms: { speed: 5.0, sensorDist: 14, diffusion: 0.25, deposit: 8,  decay: 0.958, turnSpeed: 20, trailBright: 3.4 } },
    // Long streaky paths, nervous energy. Lightning in a bottle.
    electric:    { bg: { speed: 7.0, sensorDist: 14, diffusion: 0.15, deposit: 10, decay: 0.962, turnSpeed: 28, trailBright: 1.5, foodCount: 14 },
                   ms: { speed: 6.0, sensorDist: 10, diffusion: 0.12, deposit: 14, decay: 0.968, turnSpeed: 26, trailBright: 3.0 } },
    // Wide flowing rivers, slow and heavy. Lava lamp.
    flow:        { bg: { speed: 4.5, sensorDist: 26, diffusion: 0.42, deposit: 4,  decay: 0.945, turnSpeed: 14, trailBright: 0.7, foodCount: 6 },
                   ms: { speed: 4.0, sensorDist: 16, diffusion: 0.38, deposit: 4,  decay: 0.948, turnSpeed: 12, trailBright: 1.4, densityMult: 0.4, trailMax: 120 } },
    // Tight clusters with bright nodes. Constellation map.
    spore:       { bg: { speed: 4.5, sensorDist: 12, diffusion: 0.20, deposit: 16, decay: 0.955, turnSpeed: 18, trailBright: 1.8, foodCount: 20 },
                   ms: { speed: 3.5, sensorDist: 10, diffusion: 0.16, deposit: 18, decay: 0.962, turnSpeed: 16, trailBright: 3.2 } },
};

const TEXTURE_NAMES = ['standard', 'crystalline', 'smoke', 'coral', 'silk', 'electric', 'flow', 'spore'];

const PALETTES = [
    { name: 'Ember',  mascot: ['#181208', '#E0B860', '#E8A070'], bg: ['#121010', '#9A8A55', '#8A7050'], chromatic: ['rgba(240,140,80,A)', 'rgba(80,180,220,A)'] },
    { name: 'Frost',  mascot: ['#0A1018', '#70B0E0', '#90C8E8'], bg: ['#0C1014', '#507898', '#608090'], chromatic: ['rgba(100,180,240,A)', 'rgba(180,120,220,A)'] },
    { name: 'Moss',   mascot: ['#0C1408', '#88C870', '#B0D890'], bg: ['#0C1210', '#608858', '#6A8060'], chromatic: ['rgba(120,220,100,A)', 'rgba(220,200,80,A)'] },
    { name: 'Pearl',  mascot: ['#0E0E0E', '#C0B8B0', '#E0D8D0'], bg: ['#0A0A0A', '#807870', '#9A9490'], chromatic: ['rgba(200,200,220,A)', 'rgba(140,130,160,A)'] },
    { name: 'Bloom',  mascot: ['#140A10', '#D880B8', '#E0A0C8'], bg: ['#120C10', '#906878', '#886878'], chromatic: ['rgba(220,120,180,A)', 'rgba(100,220,180,A)'] },
    { name: 'Honey',  mascot: ['#14120A', '#E0C860', '#E8C080'], bg: ['#12100A', '#988850', '#8A8058'], chromatic: ['rgba(230,200,80,A)', 'rgba(80,130,220,A)'] },
    { name: 'Tide',   mascot: ['#080C14', '#6888C0', '#80A0D0'], bg: ['#0A0C12', '#506888', '#486080'], chromatic: ['rgba(100,140,220,A)', 'rgba(220,140,100,A)'] },
    { name: 'Rust',   mascot: ['#140C08', '#C88060', '#D8A080'], bg: ['#120A0A', '#8A6050', '#806048'], chromatic: ['rgba(210,130,90,A)', 'rgba(90,200,180,A)'] },
];

// Active palette (set per seed in initAll)
let activePalette = PALETTES[0];
let COLORS = [...activePalette.mascot];
let BG_COLORS = [...activePalette.bg];

// HSL helpers for per-seed drift
function hexToHSL(hex) {
    let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
    let max = Math.max(r,g,b), min = Math.min(r,g,b), h, s, l = (max+min)/2;
    if (max === min) { h = s = 0; } else {
        let d = max - min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        if (max === r) h = ((g-b)/d + (g<b?6:0))/6;
        else if (max === g) h = ((b-r)/d+2)/6;
        else h = ((r-g)/d+4)/6;
    }
    return [h*360, s*100, l*100];
}

function hslToHex(h, s, l) {
    h = ((h%360)+360)%360; s = Math.max(0,Math.min(100,s))/100; l = Math.max(0,Math.min(100,l))/100;
    let c = (1-Math.abs(2*l-1))*s, x = c*(1-Math.abs((h/60)%2-1)), m = l-c/2;
    let r,g,b;
    if (h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
    else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else{r=c;g=0;b=x;}
    let toHex = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
    return '#' + toHex(r) + toHex(g) + toHex(b);
}

function driftColor(hex, hueDrift, satDrift, lumDrift) {
    let [h,s,l] = hexToHSL(hex);
    return hslToHex(h + hueDrift, s + satDrift, l + lumDrift);
}

let activeTextureName = 'standard';

function selectPalette(seed) {
    // Palette and texture on independent cycles
    let palIdx = seed % PALETTES.length;
    let texIdx = Math.floor(seed / PALETTES.length) % TEXTURE_NAMES.length;
    activePalette = PALETTES[palIdx];
    activeTextureName = TEXTURE_NAMES[texIdx];

    // Per-seed drift within family (subtle: +/-8 hue, +/-5 sat, +/-3 lum)
    let tmpRng = seed;
    function quickRng() { tmpRng = (tmpRng * 16807 + 0) % 2147483647; return tmpRng / 2147483647; }
    let hDrift = (quickRng() - 0.5) * 16;
    let sDrift = (quickRng() - 0.5) * 10;
    let lDrift = (quickRng() - 0.5) * 6;

    COLORS = activePalette.mascot.map(c => driftColor(c, hDrift, sDrift, lDrift));
    BG_COLORS = activePalette.bg.map(c => driftColor(c, hDrift * 0.6, sDrift * 0.4, lDrift * 0.3));

    // Apply texture profile (decoupled from palette)
    let tex = TEXTURES[activeTextureName] || TEXTURES.standard;
    let bgTex = tex.bg;
    let msTex = tex.ms;

    // Per-seed jitter within texture (subtle, +/-10% of each param)
    function jitter(base, range) { return base + (quickRng() - 0.5) * base * range; }

    BG.speed = jitter(bgTex.speed, 0.15);
    BG.sensorDist = Math.round(jitter(bgTex.sensorDist, 0.15));
    BG.diffusion = Math.max(0.05, Math.min(0.50, jitter(bgTex.diffusion, 0.20)));
    BG.deposit = Math.max(2, Math.round(jitter(bgTex.deposit, 0.15) * 0.7));
    BG.decay = Math.max(0.940, Math.min(0.990, jitter(bgTex.decay, 0.005) - 0.004));
    BG.turnSpeed = jitter(bgTex.turnSpeed, 0.15) * Math.PI / 180;
    BG.trailBright = jitter(bgTex.trailBright, 0.10) * 0.75;
    BG.foodCount = Math.round(jitter(bgTex.foodCount, 0.20));

    MS.speed = jitter(msTex.speed, 0.15);
    MS.sensorDist = Math.round(jitter(msTex.sensorDist, 0.15));
    MS.diffusion = Math.max(0.05, Math.min(0.45, jitter(msTex.diffusion, 0.20)));
    MS.deposit = Math.round(jitter(msTex.deposit, 0.15));
    MS.decay = Math.max(0.945, Math.min(0.990, jitter(msTex.decay, 0.005)));
    MS.turnSpeed = jitter(msTex.turnSpeed, 0.15) * Math.PI / 180;
    MS.trailBright = jitter(msTex.trailBright, 0.10);
    MS.densityMult = msTex.densityMult !== undefined ? msTex.densityMult : 1.0;
    MS.trailMax = msTex.trailMax || 180; // Global cap prevents mascot blowout

    // Update chromatic aberration CSS to match palette
    let warm = activePalette.chromatic[0];
    let cool = activePalette.chromatic[1];
    let mascotEl = document.getElementById('mascot-layer');
    let bgEl = document.getElementById('bg');

    let mascotAnim = `
        @keyframes chromatic-orbit {
            0%   { filter: drop-shadow(5px 0 3px ${warm.replace('A','0.30')}) drop-shadow(-5px 0 3px ${cool.replace('A','0.30')}); }
            25%  { filter: drop-shadow(0 5px 3px ${warm.replace('A','0.30')}) drop-shadow(0 -5px 3px ${cool.replace('A','0.30')}); }
            50%  { filter: drop-shadow(-5px 0 3px ${warm.replace('A','0.30')}) drop-shadow(5px 0 3px ${cool.replace('A','0.30')}); }
            75%  { filter: drop-shadow(0 -5px 3px ${warm.replace('A','0.30')}) drop-shadow(0 5px 3px ${cool.replace('A','0.30')}); }
            100% { filter: drop-shadow(5px 0 3px ${warm.replace('A','0.30')}) drop-shadow(-5px 0 3px ${cool.replace('A','0.30')}); }
        }
        @keyframes bg-chromatic {
            0%   { filter: drop-shadow(3px 0 1px ${warm.replace('A','0.08')}) drop-shadow(-3px 0 1px ${cool.replace('A','0.08')}); }
            50%  { filter: drop-shadow(-3px 0 1px ${warm.replace('A','0.08')}) drop-shadow(3px 0 1px ${cool.replace('A','0.08')}); }
            100% { filter: drop-shadow(3px 0 1px ${warm.replace('A','0.08')}) drop-shadow(-3px 0 1px ${cool.replace('A','0.08')}); }
        }`;

    // Inject updated keyframes
    let styleId = 'dynamic-chromatic';
    let existing = document.getElementById(styleId);
    if (existing) existing.remove();
    let style = document.createElement('style');
    style.id = styleId;
    style.textContent = mascotAnim;
    document.head.appendChild(style);

    // Re-trigger animations
    mascotEl.style.animation = 'none';
    bgEl.style.animation = 'none';
    void mascotEl.offsetHeight;
    // If entrance has already played, go straight to steady-state animations
    if (mascotEl.classList.contains('entered')) {
        mascotEl.classList.remove('entered');
        void mascotEl.offsetHeight;
        mascotEl.classList.add('entered');
    }
    bgEl.style.animation = 'bg-chromatic 14s linear infinite';
}

// Background sim params — thin radiating network from mascot
const BG = {
    agentCount: 8000,
    speed: 5.0,
    sensorDist: 22,
    sensorAngle: 40 * Math.PI / 180,
    turnSpeed: 20 * Math.PI / 180,
    deposit: 8,
    decay: 0.960,
    diffusion: 0.20,
    trailBright: 1.0,
    agentGlow: 0.18,
    spawnR: 15,
    stepsPerFrame: 3,
    spawnRate: 50,
    initialBatch: 1200,
    foodCount: 12,
    foodStr: 15,
};

// Mascot sim params — steady presence, not spectacle
const MS = {
    agentCount: 4000,
    speed: 3.2,
    sensorDist: 16,
    sensorAngle: 35 * Math.PI / 180,
    turnSpeed: 18 * Math.PI / 180,
    deposit: 10,
    decay: 0.975,
    diffusion: 0.22,
    trailBright: 2.2,
    agentGlow: 0.5,
    spawnR: 10,
    stepsPerFrame: 3,
    spawnRate: 40,
    initialBatch: 800,
};

let seed = Math.floor(Math.random() * 999999) + 1;

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════

// Canvases
const bgCanvas = document.getElementById('bg');
const bgSimCanvas = document.getElementById('bg-sim');
const ghostCanvas = document.getElementById('ghost-layer');
const mascotCanvas = document.getElementById('mascot-layer');
const mascotSimCanvas = document.getElementById('mascot-sim');
const maskCanvasEl = document.getElementById('mask-canvas');
const compositeCanvas = document.getElementById('composite');
const statusEl = document.getElementById('status');

const bgCtx = bgCanvas.getContext('2d');
const bgSimCtx = bgSimCanvas.getContext('2d');
const ghostCtx = ghostCanvas.getContext('2d');
const mascotCtx = mascotCanvas.getContext('2d');
const mascotSimCtx = mascotSimCanvas.getContext('2d');
const maskCtx = maskCanvasEl.getContext('2d');
const compCtx = compositeCanvas.getContext('2d');

// Viewport dimensions
let VW, VH;
// Mascot square size
let MSIZE = 400;

// Simulation state for background
let bgAgents = [], bgTrail, bgTrailPrev, bgFoods = [];
let bgCx, bgCy, bgFc = 0;

// Simulation state for mascot
let msAgents = [], msTrail, msTrailPrev, msFoods = [];
let msCx, msCy, msFc = 0;

let maskImg = null;
let featheredMask = null; // Blurred-edge version of mask for soft bleed
let densityMap = null;    // Luminance/edge map from mascot — guides trail deposit
let edgeDistMap = null;   // 0 at mask edges, 1 deep inside — fades deposit near boundaries
let edgeFoods = [];       // Food sources placed at high-contrast edges
let running = false;

// Seeded PRNG
let rngState;
function srng(s) { rngState = s | 0; }
function rng() {
    rngState = (rngState + 0x6D2B79F5) | 0;
    let t = Math.imul(rngState ^ (rngState >>> 15), 1 | rngState);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

function h2r(hex) {
    let r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? { r: parseInt(r[1], 16), g: parseInt(r[2], 16), b: parseInt(r[3], 16) } : { r: 100, g: 80, b: 30 };
}

// ═══════════════════════════════════════════════════════════════
//  MASCOT MASK
// ═══════════════════════════════════════════════════════════════

function loadMascot() {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => { maskImg = img; resolve(); };
        img.onerror = () => { statusEl.textContent = 'Could not load shumi.webp'; resolve(); };
        img.src = 'shumi.webp';
    });
}

function buildMask() {
    maskCanvasEl.width = MSIZE;
    maskCanvasEl.height = MSIZE;
    maskCtx.clearRect(0, 0, MSIZE, MSIZE);
    const s = MSIZE * 0.7;
    const mx = (MSIZE - s) / 2;
    const my = (MSIZE - s) / 2;
    maskCtx.drawImage(maskImg, mx, my, s, s);

    // Feathered mask — wide blur for gradual edge dissolution
    featheredMask = document.createElement('canvas');
    featheredMask.width = MSIZE;
    featheredMask.height = MSIZE;
    let fCtx = featheredMask.getContext('2d');
    fCtx.filter = 'blur(14px)';
    fCtx.drawImage(maskCanvasEl, 0, 0);
    fCtx.filter = 'none';

    // Edge distance map — 0 at edges, 1 deep inside. Used to fade deposit near boundaries.
    let maskData = maskCtx.getImageData(0, 0, MSIZE, MSIZE).data;
    edgeDistMap = new Float32Array(MSIZE * MSIZE);
    // First pass: binary mask
    let binary = new Uint8Array(MSIZE * MSIZE);
    for (let i = 0; i < MSIZE * MSIZE; i++) binary[i] = maskData[i * 4 + 3] > 30 ? 1 : 0;
    // Distance transform (approximate via iterative erosion layers)
    let dist = new Float32Array(MSIZE * MSIZE);
    for (let i = 0; i < MSIZE * MSIZE; i++) dist[i] = binary[i] ? 999 : 0;
    // Forward pass
    for (let y = 1; y < MSIZE - 1; y++) {
        for (let x = 1; x < MSIZE - 1; x++) {
            let i = y * MSIZE + x;
            if (dist[i] > 0) dist[i] = Math.min(dist[i], Math.min(dist[i-1], dist[i-MSIZE]) + 1);
        }
    }
    // Backward pass
    for (let y = MSIZE - 2; y > 0; y--) {
        for (let x = MSIZE - 2; x > 0; x--) {
            let i = y * MSIZE + x;
            if (dist[i] > 0) dist[i] = Math.min(dist[i], Math.min(dist[i+1], dist[i+MSIZE]) + 1);
        }
    }
    // Normalize with per-pixel noise so dissolution is ragged, not uniform
    let edgeFadeDepth = 30;
    // Low-frequency noise: sample every 8px, interpolate between
    let noiseGrid = 8;
    let nw = Math.ceil(MSIZE / noiseGrid) + 1;
    let nh = Math.ceil(MSIZE / noiseGrid) + 1;
    let noise = new Float32Array(nw * nh);
    for (let i = 0; i < noise.length; i++) noise[i] = rng() * 0.6 + 0.7; // 0.7 to 1.3
    for (let y = 0; y < MSIZE; y++) {
        for (let x = 0; x < MSIZE; x++) {
            let i = y * MSIZE + x;
            // Bilinear noise lookup
            let gx = x / noiseGrid, gy = y / noiseGrid;
            let gx0 = Math.floor(gx), gy0 = Math.floor(gy);
            let fx = gx - gx0, fy = gy - gy0;
            let gx1 = Math.min(gx0 + 1, nw - 1), gy1 = Math.min(gy0 + 1, nh - 1);
            let n = noise[gy0 * nw + gx0] * (1-fx)*(1-fy) + noise[gy0 * nw + gx1] * fx*(1-fy)
                  + noise[gy1 * nw + gx0] * (1-fx)*fy + noise[gy1 * nw + gx1] * fx*fy;
            edgeDistMap[i] = Math.min(1, (dist[i] * n) / edgeFadeDepth);
        }
    }

    // ── Build density map from mascot image ──
    // Combines edge detection + luminance contrast to create a guide field
    let imgData = maskCtx.getImageData(0, 0, MSIZE, MSIZE);
    let px = imgData.data;
    densityMap = new Float32Array(MSIZE * MSIZE);
    edgeFoods = [];

    // Pass 1: luminance
    let lum = new Float32Array(MSIZE * MSIZE);
    for (let i = 0; i < MSIZE * MSIZE; i++) {
        let r = px[i*4], g = px[i*4+1], b = px[i*4+2], a = px[i*4+3];
        lum[i] = a > 10 ? (r * 0.299 + g * 0.587 + b * 0.114) / 255 : 0;
    }

    // Pass 2: Sobel edge detection + luminance variance = density
    for (let y = 1; y < MSIZE - 1; y++) {
        for (let x = 1; x < MSIZE - 1; x++) {
            let idx = y * MSIZE + x;
            // Sobel gradient magnitude
            let gx = -lum[idx - MSIZE - 1] + lum[idx - MSIZE + 1]
                     -2*lum[idx - 1]        + 2*lum[idx + 1]
                     -lum[idx + MSIZE - 1]  + lum[idx + MSIZE + 1];
            let gy = -lum[idx - MSIZE - 1] - 2*lum[idx - MSIZE] - lum[idx - MSIZE + 1]
                     +lum[idx + MSIZE - 1]  + 2*lum[idx + MSIZE] + lum[idx + MSIZE + 1];
            let edge = Math.sqrt(gx * gx + gy * gy);

            // Density = edge strength (structural features) + base luminance
            densityMap[idx] = Math.min(1, edge * 3 + lum[idx] * 0.15);
        }
    }

    // Pass 3: find high-edge points as structural food sources
    // (eyes, cap outline, face border, stem edges)
    let candidates = [];
    for (let y = 4; y < MSIZE - 4; y += 3) {
        for (let x = 4; x < MSIZE - 4; x += 3) {
            let d = densityMap[y * MSIZE + x];
            if (d > 0.4) candidates.push({ x, y, d });
        }
    }
    // Sort by density, pick top N spread across the shape
    candidates.sort((a, b) => b.d - a.d);
    // Spatial filtering — don't cluster foods too close
    let minDist = MSIZE * 0.06;
    for (let c of candidates) {
        if (edgeFoods.length >= 30) break;
        let tooClose = false;
        for (let f of edgeFoods) {
            let dx = f.x - c.x, dy = f.y - c.y;
            if (Math.sqrt(dx*dx + dy*dy) < minDist) { tooClose = true; break; }
        }
        if (!tooClose) edgeFoods.push({ x: c.x, y: c.y, r: 100 });
    }

    // ── Build ghost afterimage — extreme shading of original mascot ──
    buildGhost();
}

function buildGhost() {
    ghostCanvas.width = MSIZE; ghostCanvas.height = MSIZE;
    let gCtx = ghostCanvas.getContext('2d');
    gCtx.clearRect(0, 0, MSIZE, MSIZE);

    // Draw original mascot art at full color
    const s = MSIZE * 0.7;
    const mx = (MSIZE - s) / 2;
    const my = (MSIZE - s) / 2;
    gCtx.drawImage(maskImg, mx, my, s, s);

    // Crush color: multiply with near-black to leave only the faintest ghost
    gCtx.globalCompositeOperation = 'multiply';
    gCtx.fillStyle = '#1a1a1a';
    gCtx.fillRect(0, 0, MSIZE, MSIZE);
    gCtx.globalCompositeOperation = 'multiply';
    gCtx.fillStyle = '#2a2a2a';
    gCtx.fillRect(0, 0, MSIZE, MSIZE);

    // Feather edges with the same mask so ghost doesn't have hard silhouette
    gCtx.globalCompositeOperation = 'destination-in';
    gCtx.drawImage(featheredMask, 0, 0);
    gCtx.globalCompositeOperation = 'source-over';

    // Show ghost immediately, will be faded out in frame loop
    ghostCanvas.classList.add('visible');
    ghostFadeStart = -1;
}

// Ghost fade state
let ghostFadeStart = -1;
const GHOST_HOLD_FRAMES = 90;
const GHOST_FADE_FRAMES = 180;

function getMaskFoodPoints(count) {
    let points = [];
    let data = maskCtx.getImageData(0, 0, MSIZE, MSIZE).data;
    let opaque = [];
    for (let y = 0; y < MSIZE; y += 3) {
        for (let x = 0; x < MSIZE; x += 3) {
            if (data[(y * MSIZE + x) * 4 + 3] > 128) opaque.push({ x, y });
        }
    }
    for (let i = 0; i < count && opaque.length > 0; i++) {
        points.push(opaque[Math.floor(rng() * opaque.length)]);
    }
    return points;
}

// ═══════════════════════════════════════════════════════════════
//  GENERIC PHYSARUM ENGINE
// ═══════════════════════════════════════════════════════════════

function sampleT(trail, w, h, x, y) {
    let ix = Math.floor(x), iy = Math.floor(y);
    if (ix < 0 || ix >= w || iy < 0 || iy >= h) return 0;
    return trail[iy * w + ix];
}

class Agent {
    constructor(x, y, h) { this.x = x; this.y = y; this.h = h; }

    step(P, trail, foods, w, h, dmap, edmap) {
        let sL = this.sense(P, trail, w, h, -P.sensorAngle);
        let sC = this.sense(P, trail, w, h, 0);
        let sR = this.sense(P, trail, w, h, P.sensorAngle);

        // Density-guided steering: sense density at left/center/right and bias toward structure
        if (dmap) {
            let sd = P.sensorDist;
            let dL = sampleT(dmap, w, h, this.x + Math.cos(this.h - P.sensorAngle) * sd, this.y + Math.sin(this.h - P.sensorAngle) * sd);
            let dC = sampleT(dmap, w, h, this.x + Math.cos(this.h) * sd, this.y + Math.sin(this.h) * sd);
            let dR = sampleT(dmap, w, h, this.x + Math.cos(this.h + P.sensorAngle) * sd, this.y + Math.sin(this.h + P.sensorAngle) * sd);
            // Blend density signal into trail sensor readings
            sL += dL * 40;
            sC += dC * 40;
            sR += dR * 40;
        }

        // Food attraction
        if (foods && foods.length > 0) {
            let bd = Infinity, ba = 0;
            for (let f of foods) {
                let dx = f.x - this.x, dy = f.y - this.y;
                let d = Math.sqrt(dx * dx + dy * dy);
                if (d < (f.r || 150) && d < bd) { bd = d; ba = Math.atan2(dy, dx); }
            }
            if (bd < 150 && bd > 3) {
                let diff = ba - this.h;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                this.h += diff * Math.pow(1 - bd / 150, 2) * 0.12;
            }
        }

        if (sC > sL && sC > sR) { /* straight */ }
        else if (sC < sL && sC < sR) { this.h += (rng() < 0.5 ? P.turnSpeed : -P.turnSpeed); }
        else if (sL > sR) { this.h -= P.turnSpeed; }
        else if (sR > sL) { this.h += P.turnSpeed; }

        this.x += Math.cos(this.h) * P.speed;
        this.y += Math.sin(this.h) * P.speed;

        // Wrap
        if (this.x < 0) this.x += w; if (this.x >= w) this.x -= w;
        if (this.y < 0) this.y += h; if (this.y >= h) this.y -= h;

        let ix = Math.floor(this.x), iy = Math.floor(this.y);
        if (ix >= 0 && ix < w && iy >= 0 && iy < h) {
            // Density-guided deposit: more trail at structural features
            let dep = P.deposit;
            if (dmap) {
                let d = dmap[iy * w + ix] || 0;
                let dm = P.densityMult !== undefined ? P.densityMult : 1.0;
                dep = P.deposit * (0.5 + d * 2.5 * dm);
            }
            // Edge dissolution: fade deposit near mask boundaries
            if (edmap) {
                let ef = edmap[iy * w + ix] || 0;
                dep *= 0.15 + ef * 0.85; // 15% deposit at very edge, full at center
            }
            let tmax = P.trailMax || 255;
            trail[iy * w + ix] = Math.min(trail[iy * w + ix] + dep, tmax);
        }
    }

    sense(P, trail, w, h, offset) {
        let a = this.h + offset;
        return sampleT(trail, w, h, this.x + Math.cos(a) * P.sensorDist, this.y + Math.sin(a) * P.sensorDist);
    }
}

function diffuse(trail, trailPrev, w, h, diffusion, decay) {
    let tmp = trailPrev; trailPrev = trail; trail = tmp;
    let id = 1 - diffusion;
    for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
            let idx = y * w + x;
            let avg = (trailPrev[idx - 1] + trailPrev[idx + 1] + trailPrev[idx - w] + trailPrev[idx + w]) * 0.25;
            trail[idx] = (trailPrev[idx] * id + avg * diffusion) * decay;
        }
    }
    return { trail, trailPrev };
}

function spawnAgent(agents, cx, cy, spawnR) {
    let a = rng() * Math.PI * 2;
    let r = rng() * spawnR;
    agents.push(new Agent(cx + Math.cos(a) * r, cy + Math.sin(a) * r, a));
}

function seedTrail(trail, cx, cy, w, h, spawnR) {
    for (let dy = -spawnR; dy <= spawnR; dy++) {
        for (let dx = -spawnR; dx <= spawnR; dx++) {
            let dd = Math.sqrt(dx * dx + dy * dy);
            if (dd < spawnR) {
                let ix = Math.floor(cx + dx), iy = Math.floor(cy + dy);
                if (ix >= 0 && ix < w && iy >= 0 && iy < h) {
                    trail[iy * w + ix] = (1 - dd / spawnR) * 40;
                }
            }
        }
    }
}

function renderTrail(ctx, trail, w, h, P, colors) {
    colors = colors || COLORS;
    let base = h2r(colors[0]), bright = h2r(colors[1]), hot = h2r(colors[2]);
    let imgData = ctx.createImageData(w, h);
    let px = imgData.data;

    for (let i = 0; i < w * h; i++) {
        let v = trail[i] * P.trailBright;
        let t = Math.min(v / 80, 1);
        let t2 = Math.min(v / 200, 1);
        let r, g, b;
        if (t2 > 0.3) {
            let ht = (t2 - 0.3) / 0.7;
            r = bright.r + (hot.r - bright.r) * ht;
            g = bright.g + (hot.g - bright.g) * ht;
            b = bright.b + (hot.b - bright.b) * ht;
        } else {
            r = base.r + (bright.r - base.r) * t;
            g = base.g + (bright.g - base.g) * t;
            b = base.b + (bright.b - base.b) * t;
        }
        let idx = i * 4;
        px[idx] = Math.min(255, r);
        px[idx + 1] = Math.min(255, g);
        px[idx + 2] = Math.min(255, b);
        px[idx + 3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════

function resize() {
    VW = window.innerWidth;
    VH = window.innerHeight;
    MSIZE = Math.floor(Math.min(VW, VH) * 0.5);
    // HiDPI: render mascot display at native resolution for sharp trails
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    bgCanvas.width = VW; bgCanvas.height = VH;
    bgSimCanvas.width = VW; bgSimCanvas.height = VH;
    compositeCanvas.width = VW; compositeCanvas.height = VH;

    // Ghost afterimage layer — same logical size as mascot
    ghostCanvas.width = MSIZE; ghostCanvas.height = MSIZE;
    ghostCanvas.style.width = MSIZE + 'px';
    ghostCanvas.style.height = MSIZE + 'px';

    // Mascot display canvas: HiDPI-scaled; sim canvas stays at logical size
    let mRender = Math.floor(MSIZE * dpr);
    mascotCanvas.width = mRender; mascotCanvas.height = mRender;
    mascotSimCanvas.width = MSIZE; mascotSimCanvas.height = MSIZE;
    if (dpr > 1) {
        mascotCanvas.style.width = MSIZE + 'px';
        mascotCanvas.style.height = MSIZE + 'px';
        mascotCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        mascotCtx.imageSmoothingEnabled = false;
    }
    window._mascotDPR = dpr;

    if (maskImg) buildMask();
}

function generateBgFoods() {
    bgFoods = [];
    let cx = VW / 2, cy = VH / 2; // center on mascot, not spawn point
    let minR = MSIZE * 0.75; // clear the mascot silhouette + buffer
    for (let i = 0; i < BG.foodCount; i++) {
        let a = rng() * Math.PI * 2;
        let r = minR + rng() * Math.min(VW, VH) * 0.35;
        bgFoods.push({
            x: cx + Math.cos(a) * r,
            y: cy + Math.sin(a) * r,
            r: 80 + rng() * 120
        });
    }
}

function initAll() {
    selectPalette(seed);
    srng(seed);

    // Reset ghost afterimage — bring it back for the new seed's entrance
    ghostFadeStart = -1;
    ghostCanvas.style.opacity = '1';
    ghostCanvas.classList.add('visible');
    if (maskImg) buildGhost();

    // ── Background sim — emanates from mascot boundary ──
    bgCx = VW / 2;
    bgCy = VH / 2;
    bgFc = 0;
    bgAgents = [];
    bgTrail = new Float32Array(VW * VH);
    bgTrailPrev = new Float32Array(VW * VH);
    // Seed trail in a ring around the mascot edge, not a center point
    let spawnRingR = MSIZE * 0.35;
    for (let i = 0; i < 24; i++) {
        let a = (i / 24) * Math.PI * 2;
        seedTrail(bgTrail, bgCx + Math.cos(a) * spawnRingR, bgCy + Math.sin(a) * spawnRingR, VW, VH, 8);
    }
    generateBgFoods();
    for (let f of bgFoods) seedTrail(bgTrail, f.x, f.y, VW, VH, 8);
    for (let i = 0; i < BG.initialBatch; i++) {
        // Spawn agents on the ring, facing outward
        let a = rng() * Math.PI * 2;
        let r = spawnRingR + (rng() - 0.5) * 20;
        let sx = bgCx + Math.cos(a) * r;
        let sy = bgCy + Math.sin(a) * r;
        bgAgents.push(new Agent(sx, sy, a + (rng() - 0.5) * 0.8));
    }
    bgSimCtx.fillStyle = '#0D0D0D';
    bgSimCtx.fillRect(0, 0, VW, VH);

    // ── Mascot sim ──
    msCx = MSIZE / 2;
    msCy = MSIZE / 2;
    msFc = 0;
    msAgents = [];
    msTrail = new Float32Array(MSIZE * MSIZE);
    msTrailPrev = new Float32Array(MSIZE * MSIZE);
    seedTrail(msTrail, msCx, msCy, MSIZE, MSIZE, MS.spawnR);
    // Use edge-detected structural food sources instead of random
    msFoods = edgeFoods.length > 0 ? edgeFoods : getMaskFoodPoints(25);
    for (let f of msFoods) seedTrail(msTrail, f.x, f.y, MSIZE, MSIZE, 6);

    // Pre-seed trail along density map so agents immediately follow structure
    if (densityMap) {
        for (let i = 0; i < MSIZE * MSIZE; i++) {
            msTrail[i] += densityMap[i] * 15;
        }
    }
    for (let i = 0; i < MS.initialBatch; i++) spawnAgent(msAgents, msCx, msCy, MS.spawnR);
    mascotSimCtx.fillStyle = '#0D0D0D';
    mascotSimCtx.fillRect(0, 0, MSIZE, MSIZE);
}

// ═══════════════════════════════════════════════════════════════
//  FRAME
// ═══════════════════════════════════════════════════════════════

function frame() {
    if (!running) return;
    bgFc++; msFc++;

    // ── Background sim step — spawn from mascot boundary ring ──
    if (bgAgents.length < BG.agentCount) {
        let n = Math.min(BG.spawnRate, BG.agentCount - bgAgents.length);
        let ringR = MSIZE * 0.35;
        for (let i = 0; i < n; i++) {
            let a = rng() * Math.PI * 2;
            let r = ringR + (rng() - 0.5) * 20;
            bgAgents.push(new Agent(bgCx + Math.cos(a) * r, bgCy + Math.sin(a) * r, a + (rng() - 0.5) * 0.8));
        }
    }
    for (let s = 0; s < BG.stepsPerFrame; s++) {
        for (let a of bgAgents) a.step(BG, bgTrail, bgFoods, VW, VH);
    }
    let bgD = diffuse(bgTrail, bgTrailPrev, VW, VH, BG.diffusion, BG.decay);
    bgTrail = bgD.trail; bgTrailPrev = bgD.trailPrev;

    // Suppress bg trail near mascot center so network thins inward, grows outward
    let fadeR = MSIZE * 0.358;
    let fadeR2 = fadeR * fadeR;
    let yMin = Math.max(0, Math.floor(bgCy - fadeR)), yMax = Math.min(VH - 1, Math.ceil(bgCy + fadeR));
    let xMin = Math.max(0, Math.floor(bgCx - fadeR)), xMax = Math.min(VW - 1, Math.ceil(bgCx + fadeR));
    for (let y = yMin; y <= yMax; y++) {
        let dy = y - bgCy;
        for (let x = xMin; x <= xMax; x++) {
            let dx = x - bgCx;
            let d2 = dx * dx + dy * dy;
            if (d2 < fadeR2) {
                let f = Math.sqrt(d2) / fadeR; // 0 at center, 1 at edge
                f = f * f; // quadratic falloff: stronger suppression near center
                bgTrail[y * VW + x] *= f;
            }
        }
    }

    // ── Mascot sim step ──
    if (msAgents.length < MS.agentCount) {
        let n = Math.min(MS.spawnRate, MS.agentCount - msAgents.length);
        for (let i = 0; i < n; i++) spawnAgent(msAgents, msCx, msCy, MS.spawnR);
    }
    for (let s = 0; s < MS.stepsPerFrame; s++) {
        for (let a of msAgents) a.step(MS, msTrail, msFoods, MSIZE, MSIZE, densityMap, edgeDistMap);
    }
    let msD = diffuse(msTrail, msTrailPrev, MSIZE, MSIZE, MS.diffusion, MS.decay);
    msTrail = msD.trail; msTrailPrev = msD.trailPrev;

    // ── Render background (desaturated, cooler) ──
    renderTrail(bgSimCtx, bgTrail, VW, VH, BG, BG_COLORS);
    bgCtx.drawImage(bgSimCanvas, 0, 0);

    // Atmospheric vignette — tighter falloff centered on mascot, creates depth
    let vigR = Math.max(VW, VH) * 0.50;
    let grad = bgCtx.createRadialGradient(VW/2, VH/2, MSIZE * 0.18, VW/2, VH/2, vigR);
    let vigFade = Math.min(1, bgFc * 0.008);
    grad.addColorStop(0, `rgba(13,13,13,${0.50 * vigFade})`);
    grad.addColorStop(0.35, `rgba(13,13,13,${0.22 * vigFade})`);
    grad.addColorStop(0.7, `rgba(13,13,13,${0.06 * vigFade})`);
    grad.addColorStop(1, 'rgba(13,13,13,0)');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, VW, VH);

    // ── Render mascot (full warmth, bright) ──
    renderTrail(mascotSimCtx, msTrail, MSIZE, MSIZE, MS, COLORS);
    mascotCtx.clearRect(0, 0, MSIZE, MSIZE);
    mascotCtx.drawImage(mascotSimCanvas, 0, 0);

    // Feathered mask — blur the alpha edges for soft bleed
    mascotCtx.globalCompositeOperation = 'destination-in';
    mascotCtx.drawImage(featheredMask, 0, 0);
    mascotCtx.globalCompositeOperation = 'source-over';

    // ── Ghost afterimage fade — burned retina effect ──
    if (ghostFadeStart < 0 && msFc > GHOST_HOLD_FRAMES) ghostFadeStart = msFc;
    if (ghostFadeStart > 0) {
        let elapsed = msFc - ghostFadeStart;
        let t = Math.min(1, elapsed / GHOST_FADE_FRAMES);
        let opacity = 1 - t * t * (3 - 2 * t);
        ghostCanvas.style.opacity = opacity.toFixed(3);
        if (opacity <= 0.001) ghostCanvas.classList.remove('visible');
    }

    // ── Composite for recording ──
    if (isRecording) {
        compCtx.drawImage(bgCanvas, 0, 0);
        let mx = (VW - MSIZE) / 2;
        let my = (VH - MSIZE) / 2;
        // Include ghost afterimage in recording if still visible
        if (ghostCanvas.classList.contains('visible')) {
            compCtx.globalAlpha = parseFloat(ghostCanvas.style.opacity) || 1;
            compCtx.drawImage(ghostCanvas, mx, my, MSIZE, MSIZE);
            compCtx.globalAlpha = 1;
        }
        compCtx.drawImage(mascotCanvas, mx, my);
    }

    if (msFc === 1) {
        statusEl.textContent = `${seed} · ${activePalette.name} · ${activeTextureName}`;
        statusEl.classList.add('show');
        clearTimeout(statusEl._fadeTimer);
        statusEl._fadeTimer = setTimeout(() => statusEl.classList.remove('show'), 3000);
    }
    requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════════════════════
//  RECORDING
// ═══════════════════════════════════════════════════════════════

let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;

function toggleRecord() {
    if (isRecording) stopRecord();
    else startRecord();
}

function startRecord() {
    // Make composite visible for capture
    compositeCanvas.style.opacity = '1';
    compositeCanvas.style.zIndex = '5';

    let stream = compositeCanvas.captureStream(60);
    recordedChunks = [];
    let mimeType = 'video/webm;codecs=vp9';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        let blob = new Blob(recordedChunks, { type: 'video/webm' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `shumi-masked-${seed}.webm`;
        a.click();
        URL.revokeObjectURL(url);
        compositeCanvas.style.opacity = '0';
        compositeCanvas.style.zIndex = '-1';
    };
    mediaRecorder.start(100);
    isRecording = true;
    document.getElementById('rec-btn').textContent = '■ Stop';
    document.getElementById('rec-btn').classList.add('active');
}

function stopRecord() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    document.getElementById('rec-btn').textContent = '● Record';
    document.getElementById('rec-btn').classList.remove('active');
}

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════

function restart() {
    seed = Math.floor(Math.random() * 999999) + 1;
    initAll();
    // Re-trigger entrance animation on new seed
    mascotCanvas.classList.remove('entered');
    void mascotCanvas.offsetHeight; // force reflow
    mascotCanvas.classList.add('entered');
    if (!running) { running = true; requestAnimationFrame(frame); }
}

function savePNG() {
    // Composite both layers
    compCtx.drawImage(bgCanvas, 0, 0);
    let mx = (VW - MSIZE) / 2;
    let my = (VH - MSIZE) / 2;
    compCtx.drawImage(mascotCanvas, mx, my);
    let a = document.createElement('a');
    a.download = `shumi-masked-${seed}.png`;
    a.href = compositeCanvas.toDataURL('image/png');
    a.click();
}

window.addEventListener('resize', () => {
    resize();
    initAll();
});

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════

async function boot() {
    await loadMascot();
    resize();
    initAll();
    running = true;
    // Trigger entrance animation after first frame renders
    requestAnimationFrame(() => {
        mascotCanvas.classList.add('entered');
        frame();
    });
}

boot();
</script>
</body>
</html>
